<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a1423">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>婚活トークラボ</title>
<style>
:root{
  --bg:#1a1423; --bg2:#231a2e; --plum:#2b1f3a; --navy:#1c1a2e;
  --rose:#e8a0a8; --rose-d:#c97f89; --gold:#d4af37; --gold-l:#e6c964;
  --text:#f2e9ee; --muted:#b9a7b8; --card:rgba(255,255,255,0.05);
  --card-b:rgba(232,160,168,0.18); --good:#8fd4a8; --bad:#e88a8a;
  --shadow:0 6px 24px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:linear-gradient(160deg,#1a1423 0%,#231a2e 55%,#1c1a2e 100%);
  background-attachment:fixed; color:var(--text);
  line-height:1.6; letter-spacing:.01em;
}
#app{max-width:480px;margin:0 auto;min-height:100%;position:relative;padding-bottom:78px;}
header.top{
  padding:20px 18px 12px;text-align:center;
  border-bottom:1px solid rgba(232,160,168,0.12);
}
header.top h1{
  font-size:1.5rem;font-weight:700;letter-spacing:.12em;
  background:linear-gradient(90deg,var(--rose),var(--gold-l));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
header.top .sub{font-size:.72rem;color:var(--muted);letter-spacing:.08em;margin-top:4px;}
main{padding:16px 16px 8px;}
.view{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card{
  background:var(--card);border:1px solid var(--card-b);border-radius:16px;
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow);
  backdrop-filter:blur(6px);animation:pop .3s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.98);}to{opacity:1;transform:none;}}
.card h2,.card h3{letter-spacing:.06em;}
.sec-title{font-size:1.05rem;font-weight:700;letter-spacing:.08em;margin:6px 2px 12px;color:var(--rose);}
.muted{color:var(--muted);font-size:.82rem;}
.gold{color:var(--gold-l);}
.rose{color:var(--rose);}
.btn{
  display:inline-block;width:100%;padding:13px 14px;border:none;border-radius:12px;
  background:linear-gradient(90deg,var(--rose-d),var(--rose));color:#2a1420;
  font-size:.95rem;font-weight:700;letter-spacing:.05em;cursor:pointer;
  transition:transform .15s ease,filter .15s ease;margin-top:6px;
}
.btn:active{transform:scale(.97);}
.btn.ghost{background:transparent;border:1px solid var(--card-b);color:var(--text);}
.btn.gold{background:linear-gradient(90deg,var(--gold),var(--gold-l));color:#2a2010;}
.btn:disabled{filter:grayscale(.5) opacity(.6);cursor:default;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pill{
  display:inline-block;padding:5px 11px;border-radius:999px;font-size:.74rem;
  border:1px solid var(--card-b);color:var(--muted);margin:0 4px 4px 0;
}
.pill.on{background:var(--rose);color:#2a1420;border-color:var(--rose);font-weight:700;}
.progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:8px 0;}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--rose));border-radius:999px;transition:width .5s ease;}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.stat{text-align:center;flex:1;}
.stat b{display:block;font-size:1.3rem;color:var(--gold-l);letter-spacing:.04em;}
.stat span{font-size:.7rem;color:var(--muted);}
.shortcut{display:flex;align-items:center;gap:12px;cursor:pointer;}
.shortcut .ico{font-size:1.6rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid var(--card-b);}
.shortcut .t{flex:1;}
.shortcut .t b{font-size:.98rem;letter-spacing:.04em;}
.shortcut .arw{color:var(--muted);font-size:1.2rem;}
.choice{
  display:block;width:100%;text-align:left;padding:13px 14px;margin:8px 0;
  background:rgba(255,255,255,.04);border:1px solid var(--card-b);border-radius:12px;
  color:var(--text);font-size:.92rem;cursor:pointer;transition:all .15s ease;
}
.choice:active{transform:scale(.99);}
.choice.correct{background:rgba(143,212,168,.18);border-color:var(--good);}
.choice.wrong{background:rgba(232,138,138,.18);border-color:var(--bad);}
.choice.dim{opacity:.5;}
.expbox{background:rgba(212,175,55,.08);border-left:3px solid var(--gold);border-radius:8px;padding:12px;margin-top:12px;font-size:.86rem;animation:fade .3s;}
.expbox .use{margin-top:8px;color:var(--rose);font-size:.85rem;}
.bubble{max-width:80%;padding:11px 14px;border-radius:16px;margin:8px 0;font-size:.9rem;animation:fade .3s;clear:both;}
.bubble.p{background:rgba(255,255,255,.07);border:1px solid var(--card-b);border-top-left-radius:4px;float:left;}
.bubble.me{background:linear-gradient(90deg,var(--rose-d),var(--rose));color:#2a1420;border-top-right-radius:4px;float:right;}
.chatwrap{overflow:hidden;margin-bottom:8px;}
.fb{clear:both;background:rgba(212,175,55,.08);border:1px dashed var(--gold);border-radius:8px;padding:9px 12px;margin:6px 0;font-size:.8rem;color:var(--gold-l);animation:fade .3s;}
.hearts{font-size:1.4rem;letter-spacing:2px;text-align:center;margin:8px 0;}
.tech-item{border-bottom:1px solid rgba(255,255,255,.06);padding:12px 2px;cursor:pointer;}
.tech-item:last-child{border-bottom:none;}
.tech-item .nm{font-weight:700;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center;}
.tech-body{margin-top:10px;font-size:.85rem;animation:fade .3s;}
.tech-body .lbl{color:var(--rose);font-size:.76rem;letter-spacing:.08em;margin-top:10px;display:block;}
.quote{background:rgba(255,255,255,.04);border-left:3px solid var(--rose);border-radius:8px;padding:10px 12px;margin:6px 0;font-style:italic;white-space:pre-wrap;}
.opener{background:rgba(232,160,168,.1);border:1px solid var(--card-b);border-radius:10px;padding:10px 12px;margin:6px 0;color:var(--rose);font-size:.92rem;}
.done-mark{color:var(--good);font-size:.9rem;}
nav.tabs{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;
  display:flex;background:rgba(26,20,35,.92);backdrop-filter:blur(10px);
  border-top:1px solid rgba(232,160,168,.15);z-index:50;
}
nav.tabs button{
  flex:1;background:none;border:none;color:var(--muted);padding:9px 2px 10px;
  font-size:.66rem;letter-spacing:.02em;cursor:pointer;transition:color .2s;
}
nav.tabs button .ic{display:block;font-size:1.25rem;margin-bottom:2px;transition:transform .2s;}
nav.tabs button.on{color:var(--rose);}
nav.tabs button.on .ic{transform:translateY(-2px) scale(1.12);}
.center{text-align:center;}
.big{font-size:2rem;font-weight:700;color:var(--gold-l);}
.tag{font-size:.7rem;color:var(--muted);}
.mb0{margin-bottom:0;}
.mt12{margin-top:12px;}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1>婚活トークラボ</h1>
    <div class="sub">会話の引き出しを増やして、素敵な出会いへ</div>
  </header>
  <main id="main"></main>
  <nav class="tabs" id="tabs">
    <button data-tab="home" class="on"><span class="ic">🏠</span>ホーム</button>
    <button data-tab="quiz"><span class="ic">📝</span>クイズ</button>
    <button data-tab="sim"><span class="ic">💬</span>会話シミュ</button>
    <button data-tab="tech"><span class="ic">✨</span>テクニック</button>
    <button data-tab="neta"><span class="ic">📔</span>ネタ帳</button>
  </nav>
</div>
<script>
/* ===== DATA (build.py がマーカー間を実データに差し替える) ===== */
const QUIZ=[
{"id": "S01", "cat": "SAKE", "q": "赤ワインの色のもとになるのは、ブドウのどの部分でしょう?", "choices": ["果肉", "種", "果皮", "茎"], "answer": 2, "exp": "赤ワインの赤い色は果皮の色素に由来します。黒ブドウを果皮ごと発酵させることで色が付き、白ワインは果皮を取り除いて造るため色が付きません。ロゼは途中で果皮を抜きます。「皮ごとで赤、皮なしで白」と覚えると分かりやすいです。", "use": "ワイン選びの場面で「赤の色は皮からなんですよね」と一言添えると、さりげなく詳しさが伝わり会話が広がります。"},
{"id": "S02", "cat": "SAKE", "q": "「ボディが軽い」赤ワインとは、どんな特徴を表す言葉でしょう?", "choices": ["甘みが強い", "アルコールが高い", "色が濃い", "渋みやコクが控えめで飲みやすい"], "answer": 3, "exp": "ボディとはワインの飲みごたえや重厚感を表す言葉で、ライトボディは渋みやコクが控えめで軽やか、フルボディは濃厚で力強い味わいです。甘さの度合いとは別物である点に注意しましょう。「体格(ボディ)が軽い=あっさり」とイメージすると覚えやすいです。", "use": "相手の好みを聞くとき「重すぎない軽やかな赤とかどうですか?」と提案できると、押し付けずに気配りが伝わります。"},
{"id": "S03", "cat": "SAKE", "q": "繊細な白身魚の料理に合わせやすいワインは、一般的にどれでしょう?", "choices": ["すっきりした辛口の白", "フルボディの赤", "甘口の貴腐ワイン", "濃厚な赤"], "answer": 0, "exp": "淡白な白身魚には、酸味がさわやかで軽やかな辛口の白ワインがよく合います。濃厚な赤は魚の繊細な味を消し、渋みが生臭さを強調することもあります。「白い料理に白ワイン」を基本に、色や重さを合わせると失敗しにくいです。", "use": "料理を決めた後に「じゃあ白身だし、すっきりした白を合わせましょうか」と流れで提案するとスマートです。"},
{"id": "S04", "cat": "SAKE", "q": "レストランでワインのテイスティングを求められたとき、本来の目的は何でしょう?", "choices": ["味が好みか確かめる", "ワインが劣化していないか確認する", "値段に見合うか判断する", "量を確かめる"], "answer": 1, "exp": "注文したワインが劣化(コルク臭など)していないかを確認するのがテイスティングの目的で、好みに合うかどうかを判断する場ではありません。明らかな異臭がなければ「大丈夫です」と伝えればOKです。「味見ではなく品質チェック」と覚えておくと落ち着いて対応できます。", "use": "テイスティングを頼まれたら慌てず「大丈夫です、お願いします」と伝えられると、場慣れした落ち着きが好印象です。"},
{"id": "S05", "cat": "SAKE", "q": "ワインを注ぐとき、ボトルの持ち方として基本とされるのはどれでしょう?", "choices": ["ラベルを手で隠して持つ", "首の部分だけをつまむ", "ラベルを上にして相手から見えるように持つ", "両手で底を支える"], "answer": 2, "exp": "ワインはラベルが相手から見えるように、ボトルの下の方を持って注ぐのが基本です。ラベルを手で隠すと銘柄が見えず失礼にあたります。「ラベルは相手へのプレゼン」と考えると持ち方を思い出しやすいです。", "use": "相手のグラスに注ぐ場面で自然にラベルを見せて注げると、細やかな所作が伝わり信頼感につながります。"},
{"id": "S06", "cat": "SAKE", "q": "シャンパンと名乗れるスパークリングワインの条件は、次のうちどれでしょう?", "choices": ["泡が強いこと", "甘口であること", "高価であること", "フランス・シャンパーニュ地方産であること"], "answer": 3, "exp": "シャンパンはフランス・シャンパーニュ地方で規定の製法により造られた発泡ワインだけが名乗れる呼び名です。他地域の発泡ワインはスパークリングワインやカヴァ、クレマンなどと呼ばれます。「シャンパン=地名ブランド」と覚えましょう。", "use": "乾杯の場面で「これはスパークリングですね、シャンパンは産地限定なんですよ」と軽く話すと知的な印象になります。"},
{"id": "S07", "cat": "SAKE", "q": "日本酒の「純米酒」を最もよく表す説明はどれでしょう?", "choices": ["米・米麹・水だけで造る", "醸造アルコールを加える", "蒸留して造る", "果実を加える"], "answer": 0, "exp": "純米酒は米・米麹・水のみを原料とし、醸造アルコールを加えないお酒で、米本来のふくよかな味わいが特徴です。アルコールを添加したものは本醸造酒などと呼ばれます。「純粋に米だけ=純米」と結びつけると覚えやすいです。", "use": "日本酒を選ぶ席で「米だけで造る純米酒はコクがありますよ」と説明できると、和の教養が自然に伝わります。"},
{"id": "S08", "cat": "SAKE", "q": "日本酒の「大吟醸」を特徴づける主な要素はどれでしょう?", "choices": ["熟成年数が長い", "米を高度に磨いている", "甘みが強い", "炭酸が入っている"], "answer": 1, "exp": "大吟醸は精米歩合50%以下、つまり米を半分以上削って磨き、低温でじっくり醸したお酒で、華やかな香りと澄んだ味わいが特徴です。吟醸は60%以下です。「たくさん磨くほど吟醸ランクが上がる」と覚えると整理できます。", "use": "特別な日の乾杯で「今日は華やかな大吟醸にしませんか」と提案すると、記念日らしい特別感を演出できます。"},
{"id": "S09", "cat": "SAKE", "q": "香りの高い吟醸系の日本酒を楽しむのに向く飲み方はどれでしょう?", "choices": ["熱燗にする", "氷を大量に入れる", "冷やして飲む", "炭酸で割る"], "answer": 2, "exp": "吟醸香と呼ばれる華やかな香りは冷やすと引き立つため、吟醸系は冷酒で楽しむのが向いています。熱燗にすると繊細な香りが飛びやすくなります。一方、純米酒などは燗にするとうまみが増すものもあります。「香り系は冷やして」と覚えましょう。", "use": "お店で温度を選ぶ時「これは香りがいいので冷やで飲みましょうか」と提案でき、飲み方まで気を配れます。"},
{"id": "S10", "cat": "SAKE", "q": "日本酒を注ぐときのマナーとして、正しいのはどれでしょう?", "choices": ["徳利の注ぎ口を使わず横から注ぐ", "片手でさっと注ぐのが粋", "自分の分を先に注ぐ", "相手の杯が空いたら注ぎ足す気遣いをする"], "answer": 3, "exp": "相手の杯が空きそうなときにさりげなく注ぎ足すのが日本酒の席の心配りです。徳利は両手か、片手に添え手を添えて丁寧に注ぎます。無理強いは禁物で、相手のペースを尊重することも大切です。「空いたら気づく、でも押し付けない」が基本です。", "use": "相手の杯が空いたら「もう一杯いかがですか?」と声をかけると、押し付けずに気配りが伝わります。"},
{"id": "S11", "cat": "SAKE", "q": "ビールの「ラガー」と「エール」を分ける主な違いはどれでしょう?", "choices": ["酵母と発酵方法の違い", "色の違いだけ", "アルコール度数の規定", "産地の違い"], "answer": 0, "exp": "ラガーは低温で下面発酵させたすっきり系、エールは常温に近い上面発酵で香り豊かなタイプと、酵母と発酵方法が異なります。日本の大手ビールの多くはラガーです。「すっきりラガー、香りのエール」と対比で覚えましょう。", "use": "クラフトビールの店で「エールは香りが豊かなんですよ」と説明しつつ相手の好みを聞くと会話が弾みます。"},
{"id": "S12", "cat": "SAKE", "q": "焼酎の「乙類(本格焼酎)」の特徴として正しいのはどれでしょう?", "choices": ["連続式蒸留でクセがない", "単式蒸留で原料の風味が残る", "醸造酒である", "発泡している"], "answer": 1, "exp": "乙類(本格焼酎)は単式蒸留で、芋や麦など原料の香りや風味が豊かに残るのが特徴です。甲類は連続式蒸留でクセが少なく、チューハイなどに使われます。「本格=原料の個性が濃い」と覚えると区別しやすいです。", "use": "焼酎を選ぶ席で「芋の香りが好きなら本格焼酎ですね」と好みに合わせて提案でき、詳しさが伝わります。"},
{"id": "S13", "cat": "SAKE", "q": "焼酎の「お湯割り」を作るとき、一般的に先に入れるとよいとされるのはどちらでしょう?", "choices": ["先に焼酎", "同時", "先にお湯", "氷を先に"], "answer": 2, "exp": "お湯割りは先にお湯を注ぎ、後から焼酎を加えると自然に混ざり、香りが立ちやすくなります。逆にすると混ざりにくいとされます。目安はお湯6:焼酎4ほど。「お湯が先、焼酎が後」と順番で覚えましょう。", "use": "寒い季節のお店で「お湯割りはお湯を先に入れると香りが立つんですよ」と話すと、通な一面を見せられます。"},
{"id": "S14", "cat": "SAKE", "q": "食前に軽く飲む「食前酒(アペリティフ)」の主な役割はどれでしょう?", "choices": ["満腹にする", "締めに飲む", "酔いを覚ます", "食欲を高める"], "answer": 3, "exp": "食前酒は食欲を促し、これから始まる食事への期待を高めるために軽く飲むお酒で、シェリーやスパークリングなどが定番です。逆に食後に飲むのは食後酒(ディジェスティフ)です。「アペリティフは食事の前奏曲」とイメージしましょう。", "use": "コースの初めに「まず軽く食前酒でも頼みますか?」と誘えると、食事の流れをスマートにリードできます。"},
{"id": "S15", "cat": "SAKE", "q": "定番カクテル「ジントニック」のベースとなるお酒はどれでしょう?", "choices": ["ジン", "ウォッカ", "ラム", "テキーラ"], "answer": 0, "exp": "ジントニックはその名の通りジンをトニックウォーターで割ったカクテルで、さわやかな香りと軽い苦味が特徴です。ウォッカを使えばウォッカトニックになります。「名前の頭にベースの酒名」と覚えると多くのカクテルに応用できます。", "use": "バーで迷う相手に「軽めがよければジントニックが飲みやすいですよ」と提案でき、さりげなくエスコートできます。"},
{"id": "S16", "cat": "SAKE", "q": "乾杯でグラスを合わせるとき、目上の人に対する所作として丁寧なのはどれでしょう?", "choices": ["相手より高くグラスを掲げる", "相手のグラスより少し低い位置で合わせる", "グラスを強くぶつける", "合わせずに飲む"], "answer": 1, "exp": "目上の人との乾杯では、自分のグラスを相手より少し低い位置で合わせると謙虚さと敬意が伝わります。強くぶつけるのは品位を欠き、繊細なグラスでは割れる恐れもあります。「立てる相手より低く」と覚えると所作が身につきます。", "use": "相手の親や年上の同席者との乾杯で、そっとグラスを低めに合わせると、礼儀正しさが自然に伝わります。"},
{"id": "S17", "cat": "SAKE", "q": "お酒が飲めない相手と食事するとき、最も配慮ある対応はどれでしょう?", "choices": ["一杯だけ勧める", "無理に付き合わせる", "ノンアルや好きな飲み物で気持ちよく乾杯する", "飲めないことを話題にし続ける"], "answer": 2, "exp": "飲めない人にはノンアルコール飲料やソフトドリンクを自然に用意し、同じように乾杯を楽しめるよう配慮するのが誠実な対応です。無理強いはアルコールハラスメントにあたります。「飲む・飲まないは対等」という姿勢が信頼を生みます。", "use": "飲めない相手には「ノンアルもおいしいの増えましたよね、一緒に乾杯しましょう」と伝えると安心感を与えられます。"},
{"id": "S18", "cat": "SAKE", "q": "ワインの「マリアージュ」とは何を指す言葉でしょう?", "choices": ["ワインの熟成", "ワインの産地", "ボトルの結婚式向け装飾", "料理とワインの相性・組み合わせ"], "answer": 3, "exp": "マリアージュはフランス語で結婚を意味し、料理とワインが互いを引き立て合う相性の良い組み合わせを指します。相乗効果で両方がおいしく感じられる状態です。「料理とお酒の結婚=マリアージュ」と直訳で覚えられます。", "use": "料理とワインを選ぶ時「このチーズとのマリアージュが良さそうですね」と言えると、食事の楽しみ方が深まります。"},
{"id": "S19", "cat": "SAKE", "q": "赤ワインでよく使われるブドウ「ピノ・ノワール」の一般的な味わいはどれでしょう?", "choices": ["比較的軽やかで繊細", "渋みが非常に強く重厚", "甘みが強い", "泡立つ"], "answer": 0, "exp": "ピノ・ノワールは渋みがおだやかで、赤い果実を思わせる繊細で華やかな味わいが特徴の品種です。カベルネ・ソーヴィニヨンのような重厚さとは対照的です。「ピノは軽やか、カベルネはがっしり」と対比で覚えましょう。", "use": "重い赤が苦手な相手に「軽めがよければピノ・ノワールはどうですか」と提案でき、好みに寄り添えます。"},
{"id": "S20", "cat": "SAKE", "q": "日本酒を飲むときに添えられる「和らぎ水(やわらぎみず)」とは何でしょう?", "choices": ["お酒を薄める水", "合間に飲む水(チェイサー)", "米をとぐ水", "割り水のこと"], "answer": 1, "exp": "和らぎ水は日本酒の合間に飲む水(チェイサー)で、悪酔いを防ぎ、味覚をリセットして次の一杯をおいしく味わうためのものです。洋酒のチェイサーと同じ役割です。「和らぎ水=お酒と一緒に飲む水」と覚えましょう。", "use": "日本酒を頼むとき「お水も一緒にもらいましょうか、和らぎ水があると楽ですよ」と気遣えると好印象です。"},
{"id": "F01", "cat": "FOOD", "q": "フルコースで複数並んだカトラリー(ナイフ・フォーク)は、どの順で使うのが基本でしょう?", "choices": ["外側から使う", "内側から使う", "好きな順で使う", "中央から使う"], "answer": 0, "exp": "カトラリーは料理が出る順に外側から内側へ使っていくのが基本です。迷ったら一番外側を取れば間違いありません。内側ほどメインやデザート用になります。「外から内へ」と覚えておけば、初めての店でも落ち着いて対応できます。", "use": "コースの席で相手が迷っていたら「外側から使えば大丈夫ですよ」とそっと教えると、頼れる印象を与えられます。"},
{"id": "F02", "cat": "FOOD", "q": "洋食で食事の途中、ナイフとフォークを置いて「まだ食べている」と示すサインはどれでしょう?", "choices": ["皿の右側に揃えて置く", "皿の上でハの字(八の字)に置く", "皿の外に出す", "フォークを立てる"], "answer": 1, "exp": "食事中はナイフとフォークを皿の上で「ハの字」に置くと、まだ食べている合図になります。食べ終わったら刃を内側にして揃えて斜めに置くと下げてよいサインです。「ハの字は継続、揃えて終了」と対で覚えましょう。", "use": "会話が弾んで手を止めるとき、さりげなくハの字に置けると所作が美しく、落ち着いた印象を与えられます。"},
{"id": "F03", "cat": "FOOD", "q": "レストランで着席後、ナプキンを広げるタイミングとして適切なのはどれでしょう?", "choices": ["席に着いた瞬間すぐ", "食事の途中", "注文を終えた頃や料理が来る前", "デザートのとき"], "answer": 2, "exp": "ナプキンは全員が着席し、注文を終えた頃や乾杯の前など、食事が始まる少し前に広げて膝に置くのが自然です。座ってすぐは慌ただしく、格式ある場ではホストが取ってからが目安です。二つ折りにして折り目を手前に置きます。", "use": "相手と着席したら、タイミングを見て静かにナプキンを広げると、場慣れした落ち着きが伝わります。"},
{"id": "F04", "cat": "FOOD", "q": "食事の途中で中座するとき、ナプキンはどこに置くのがマナーでしょう?", "choices": ["テーブルの上にたたんで置く", "皿の上に置く", "首にかける", "椅子の上に置く"], "answer": 3, "exp": "中座のときはナプキンを軽くたたんで椅子の座面に置くのが基本で、「また戻ります」の意味になります。テーブルに置くのは食事終了の合図になるため中座には不向きです。「途中は椅子、終わりはテーブル」と覚えましょう。", "use": "化粧室などで一度席を立つとき、ナプキンを椅子に置いて戻れると、細やかなマナーが自然に身についていると伝わります。"},
{"id": "F05", "cat": "FOOD", "q": "和食で嫌われる箸使い「渡し箸」とは、どんな動作でしょう?", "choices": ["箸を器の上に渡して置く", "箸で料理を刺す", "箸を舐める", "箸で人を指す"], "answer": 0, "exp": "渡し箸は器の上に箸を橋のように渡して置く仕草で、「もういらない」の意味になり嫌い箸のひとつです。箸を置くときは箸置きに、なければ箸袋を折って代用します。他にも刺し箸や舐り箸などがあり、いずれも避けたい所作です。", "use": "和食の席で箸置きを使って丁寧に箸を置けると、育ちの良さや所作の美しさがさりげなく伝わります。"},
{"id": "F06", "cat": "FOOD", "q": "和食で、遠くの料理を自分の箸を逆さにして取り分けるのは正しいマナーでしょうか?", "choices": ["正しい丁寧な作法", "本来は避けたい作法で取り箸を使うのがよい", "必ずやるべき", "箸を舐めてから取る"], "answer": 1, "exp": "箸を逆さにして取り分ける「逆さ箸」は一見丁寧に見えますが、手で触れた部分で料理を扱うことになり、本来は好ましくありません。正式には取り箸(取り分け用の箸)を頼むのがスマートです。「逆さ箸より取り箸」と覚えましょう。", "use": "大皿を取り分ける場面で「取り箸もらいましょうか」と声をかけられると、清潔感と気配りの両方が伝わります。"},
{"id": "F07", "cat": "FOOD", "q": "和食で、手のひらに受け皿のように添えて汁だれを防ぐ「手皿」は正しい作法でしょうか?", "choices": ["上品な正しい作法", "必須の作法", "実は避けたい作法で懐紙や小皿を使う", "右手だけで行う"], "answer": 2, "exp": "手を皿代わりにする「手皿」は上品に見えて実はマナー違反とされます。汁だれが心配なときは懐紙や取り皿を手に持って口元に近づけるのが正解です。「手皿はNG、器を持つ」と覚えると迷いません。", "use": "料理を口に運ぶとき、小皿や器をそっと手に持って添えると、上品で洗練された所作に見えます。"},
{"id": "F08", "cat": "FOOD", "q": "握り寿司を醤油につけるとき、粋とされる付け方はどれでしょう?", "choices": ["シャリ(ご飯)側にたっぷり", "全体をどぶ漬け", "つけない", "ネタ側に少しだけ"], "answer": 3, "exp": "握り寿司はネタの先に少量の醤油をつけるのが粋とされます。シャリ側をつけると米が醤油を吸って崩れ、味も濃くなりすぎます。手で軽く横に倒して、ネタの角をちょんとつけるときれいです。「ネタに少し」を基本にしましょう。", "use": "寿司デートで「ネタ側に少しつけると崩れないですよ」と自然に伝えられると、通な余裕が感じられます。"},
{"id": "F09", "cat": "FOOD", "q": "寿司屋で出される「ガリ」の本来の役割は何でしょう?", "choices": ["口直しで味覚をリセットする", "メインのおかず", "醤油の代わり", "デザート"], "answer": 0, "exp": "ガリ(甘酢生姜)は寿司の合間に食べて口の中をさっぱりさせ、次のネタをおいしく味わうための口直しです。生姜には抗菌作用もあります。ネタに乗せて食べるものではなく、あくまで箸休めです。「ガリは口直し」と覚えましょう。", "use": "寿司の席で「ガリは口直しなんですよね」と話しつつ勧めると、さりげない知識で場が和みます。"},
{"id": "F10", "cat": "FOOD", "q": "そばを「粋に」食べる食べ方として言われるのはどれでしょう?", "choices": ["つゆにたっぷり全部浸す", "そばの先を少しつゆにつけて手繰る", "かき混ぜてから食べる", "冷ましてから食べる"], "answer": 1, "exp": "ざるそばは麺の先1/3ほどを軽くつゆにつけ、そば本来の香りを楽しむのが粋とされます。全部浸すと塩辛くなり、香りも損なわれます。すすって食べるのは日本ならではの作法です。「先だけちょい浸け」と覚えましょう。", "use": "そば店で「そばは先を少しつけると香りが楽しめますよ」と話せると、和の食文化への造詣が伝わります。"},
{"id": "F11", "cat": "FOOD", "q": "デートのお店を予約するとき、相手への気遣いとして最も大切なのはどれでしょう?", "choices": ["自分の行きたい店を優先する", "一番高い店を選ぶ", "苦手な食材やアレルギー・予算感を事前にさりげなく確認する", "予約せず当日並ぶ"], "answer": 2, "exp": "相手の苦手な食材やアレルギー、無理のない予算感を事前にさりげなく確認しておくと、安心して楽しめる店選びができます。誠実な気遣いは信頼につながります。豪華さより相手が心地よく過ごせるかを基準にしましょう。", "use": "予約前に「苦手な食べ物ってありますか?」と軽く聞いておくと、思いやりが伝わり相手も安心できます。"},
{"id": "F12", "cat": "FOOD", "q": "レストラン予約時に伝えておくと親切な情報として、適切でないのはどれでしょう?", "choices": ["記念日など利用の目的", "アレルギーの有無", "おおよその到着時間", "相手の年収"], "answer": 3, "exp": "記念日利用やアレルギー、到着時間はお店が準備しやすくなる有益な情報ですが、相手の年収は店に伝える必要も意味もありません。予約時は人数・日時・目的・要望を的確に伝えるのが基本です。「店が助かる情報だけ伝える」と考えましょう。", "use": "予約時に「記念日なんです」と伝えておくと、さりげないサプライズにつながり、相手を喜ばせられます。"},
{"id": "F13", "cat": "FOOD", "q": "会計をスマートに済ませたいとき、スムーズな振る舞いはどれでしょう?", "choices": ["頃合いを見て先に席を立ち会計を済ませる", "相手の目の前で金額を細かく確認する", "割り勘の計算を長々とする", "支払いを相手任せにする"], "answer": 0, "exp": "会計は食事の余韻を大切にするため、頃合いを見てさりげなく先に席を立って済ませるとスマートです。目の前で金額を細かく確認したり長々と計算するのは無粋です。誰が払うかは事前の合意や関係性に応じて誠実に決めましょう。", "use": "食事の終盤に「お手洗いに」と席を立つついでに会計を済ませておくと、スマートで自然な気遣いになります。"},
{"id": "F14", "cat": "FOOD", "q": "割り勘にするとき、相手に不快感を与えにくい進め方はどれでしょう?", "choices": ["1円単位まで請求する", "事前に支払い方針を共有し端数は切り上げるなど配慮する", "黙って多く払わせる", "その場で長く議論する"], "answer": 1, "exp": "割り勘は事前に「気軽に割りましょう」など方針を共有し、端数は切り上げて調整するなど、細かすぎない配慮があると気持ちよく済みます。1円単位の請求はかえって印象を損ねます。金銭は誠実に、しかしスマートに扱うのが大人の対応です。", "use": "会計時に「端数はこちらで持ちますね」と一言添えると、細やかさと余裕の両方が自然に伝わります。"},
{"id": "F15", "cat": "FOOD", "q": "和食の「一汁三菜」とは、どんな献立の構成を指すでしょう?", "choices": ["汁を3杯飲む", "3品だけ食べる", "汁物1品とおかず3品を基本とする献立", "一人前を三人で分ける"], "answer": 2, "exp": "一汁三菜は、ご飯に汁物1品と主菜1・副菜2のおかず3品を組み合わせた和食の基本形で、栄養バランスの取れた献立の目安です。日本の家庭料理の土台となる考え方です。「汁1つ、菜3つ」と数で覚えると分かりやすいです。", "use": "家庭料理の話題で「一汁三菜が基本っていいますよね」と話すと、食への丁寧な向き合い方が伝わります。"},
{"id": "F16", "cat": "FOOD", "q": "和食のうまみの土台となる「だし」の代表的な組み合わせはどれでしょう?", "choices": ["砂糖と塩", "牛乳とバター", "唐辛子とにんにく", "昆布とかつお節"], "answer": 3, "exp": "和食のだしは昆布とかつお節の組み合わせが代表的で、昆布のグルタミン酸とかつお節のイノシン酸が合わさると、うまみが飛躍的に強まります(うまみの相乗効果)。「昆布+かつおで倍のうまみ」と覚えましょう。", "use": "料理の話で「昆布とかつおを合わせるとうまみが増すんですよ」と話せると、食の知識が自然に会話に加わります。"},
{"id": "F17", "cat": "FOOD", "q": "次のうち「発酵食品」として正しいのはどれでしょう?", "choices": ["味噌・納豆・ヨーグルト", "白米・食パン・うどん", "砂糖・塩・油", "生野菜"], "answer": 0, "exp": "味噌、納豆、ヨーグルトはいずれも微生物の働きで作られる発酵食品で、独特の風味と栄養が生まれます。醤油やチーズ、漬物なども仲間です。「菌の力でおいしくなった食品=発酵食品」と覚えると見分けやすいです。", "use": "健康や食の話題で「発酵食品って腸にもいいですよね」と触れると、丁寧な暮らしぶりが伝わり会話が広がります。"},
{"id": "F18", "cat": "FOOD", "q": "料理で「旬(しゅん)」の食材とは、どんな食材を指すでしょう?", "choices": ["一年中同じ味の食材", "最も味がよく多く出回る時期の食材", "輸入した食材", "加工された食材"], "answer": 1, "exp": "旬とは、その食材が最もおいしく、栄養価も高く、多く出回って値段も手頃になる時期のことです。季節を感じる食材選びは和食の醍醐味でもあります。「旬=いちばんおいしい時期」とシンプルに覚えましょう。", "use": "メニュー選びで「今が旬の食材とかありますか?」とお店に聞けると、食を楽しむ姿勢が好印象になります。"},
{"id": "F19", "cat": "FOOD", "q": "パンをコース料理で食べるとき、上品とされる食べ方はどれでしょう?", "choices": ["ナイフで切って食べる", "丸ごとかじる", "一口大に手でちぎって食べる", "スープに浸して食べる"], "answer": 2, "exp": "テーブルのパンは一口大に手でちぎってから食べるのが上品な作法です。かじりつくのは避け、バターを塗るときもちぎった一口分に塗ります。パン皿は基本的に左側のものが自分用です。「ちぎって一口ずつ」と覚えましょう。", "use": "コースでパンが出たら、自然に一口大にちぎって食べると、日常の所作が丁寧な人という印象を与えられます。"},
{"id": "F20", "cat": "FOOD", "q": "スープを飲むとき、洋食で品よくすくう方向はどれでしょう?", "choices": ["奥から手前へすくう", "かき混ぜてから飲む", "器を口につけて流し込む", "手前から奥へすくう"], "answer": 3, "exp": "洋食のスープはスプーンを手前から奥へ動かしてすくうのが基本(イギリス式)です。音を立てず、器の底が見えたら手前を持ち上げて傾けます。すすらず静かにいただくのが洋食の作法です。「手前から奥へ、静かに」と覚えましょう。", "use": "スープが出たら静かに手前から奥へすくうと、音を立てない上品な食べ方で落ち着いた印象を与えられます。"},
{"id": "T01", "cat": "TRIP", "q": "硫黄泉(いおうせん)の特徴として一般に知られているものはどれ?", "choices": ["卵が腐ったような独特の匂いがする", "無色無臭でクセがない", "飲むと甘い味がする", "泡が肌に付く"], "answer": 0, "exp": "硫黄泉は温泉に硫化水素を含み、ゆで卵のような独特の匂いがするのが特徴です。無色無臭でクセがないのは単純温泉、泡が付くのは炭酸を含む二酸化炭素泉の特徴で、混同しやすい点です。「硫黄は卵の匂い」と結び付けて覚えると忘れにくいです。", "use": "温泉の話になったら『硫黄泉って卵みたいな匂いがしますよね、あの匂いで温泉に来た実感がわきます』と共感を誘うと会話が弾みます。"},
{"id": "T02", "cat": "TRIP", "q": "群馬県にある、自然湧出量が日本有数で「湯畑」が有名な温泉地はどこ?", "choices": ["有馬温泉", "道後温泉", "草津温泉", "下呂温泉"], "answer": 2, "exp": "草津温泉は群馬県にあり、中心部の「湯畑」から豊富な湯が湧き出す光景で知られます。有馬は兵庫、道後は愛媛、下呂は岐阜と、いずれも有名温泉地ですが場所が異なります。「草津といえば湯畑」と映像でイメージすると覚えやすいです。", "use": "温泉旅行の話題では『草津の湯畑、ライトアップされるとすごく幻想的らしいですよ』と行ってみたい気持ちを共有すると盛り上がります。"},
{"id": "T03", "cat": "TRIP", "q": "愛媛県にあり、夏目漱石の小説『坊っちゃん』ゆかりの地としても有名な温泉は?", "choices": ["別府温泉", "道後温泉", "白浜温泉", "城崎温泉"], "answer": 1, "exp": "道後温泉は愛媛県松山市にあり、日本最古級の温泉として知られ、『坊っちゃん』の舞台としても親しまれています。別府は大分、白浜は和歌山、城崎は兵庫です。「坊っちゃん=松山=道後」と作者の縁で結ぶと覚えやすいです。", "use": "文学好きの相手には『道後温泉って坊っちゃんの舞台なんですよね、本を読んでから行くと楽しそう』と趣味の話につなげられます。"},
{"id": "T04", "cat": "TRIP", "q": "「源泉数・湧出量ともに日本一」とされ、地獄めぐりで有名な大分県の温泉地は?", "choices": ["登別温泉", "鬼怒川温泉", "箱根温泉", "別府温泉"], "answer": 3, "exp": "別府温泉は大分県にあり、源泉数・湧出量が日本一とされ、色鮮やかな源泉を巡る「地獄めぐり」が名物です。登別は北海道、鬼怒川は栃木、箱根は神奈川です。「別府の地獄めぐり」とセットで覚えると産地を間違えにくいです。", "use": "『別府の地獄めぐり、青や赤の温泉が見られて観光としても面白いらしいですよ』と入浴以外の楽しみ方を紹介すると話題が広がります。"},
{"id": "T05", "cat": "TRIP", "q": "炭酸水素塩泉が一般に「美肌の湯」と呼ばれることがあるのはなぜ?", "choices": ["肌を強く引き締めるため", "皮膚の余分な角質や皮脂を落とす働きがあるとされるため", "肌に色を付けるため", "肌をすぐ日焼けさせるため"], "answer": 1, "exp": "炭酸水素塩泉は皮膚の余分な角質や皮脂を落とす働きがあるとされ、湯上がりに肌がなめらかに感じられることから「美肌の湯」と呼ばれます。効果には個人差があります。引き締めは塩化物泉のイメージと混同しやすい点です。「重曹のような洗浄イメージ」で覚えられます。", "use": "『炭酸水素塩泉は美肌の湯とも言われるみたいですよ』と一般論として軽く添えると、押し付けにならず知的な印象を与えられます。"},
{"id": "T06", "cat": "TRIP", "q": "広島県にあり、海に浮かぶ朱色の大鳥居で知られる世界遺産の神社は?", "choices": ["出雲大社", "伊勢神宮", "日光東照宮", "厳島神社"], "answer": 3, "exp": "厳島神社は広島県宮島にあり、潮の満ち引きで海に浮かんで見える朱色の大鳥居が象徴で、世界文化遺産に登録されています。出雲大社は島根、伊勢神宮は三重、日光東照宮は栃木です。「宮島=海に浮かぶ鳥居」で覚えられます。", "use": "『厳島神社の大鳥居、満潮だと海に浮かんで見えるらしくて、潮の時間を調べて行くと良さそうですね』と旅の計画話に発展させられます。"},
{"id": "T07", "cat": "TRIP", "q": "「日光を見ずして結構と言うなかれ」で知られる、徳川家康を祀った世界遺産は?", "choices": ["日光東照宮", "中尊寺金色堂", "首里城", "二条城"], "answer": 0, "exp": "日光東照宮は栃木県にあり、徳川家康を祀る豪華絢爛な建築で世界遺産に登録されています。「見ざる・言わざる・聞かざる」の三猿や眠り猫の彫刻も有名です。中尊寺は岩手、首里城は沖縄、二条城は京都です。「日光=家康・三猿」で覚えられます。", "use": "『日光東照宮の三猿、見ざる言わざる聞かざるの元祖なんですよね』と誰もが知る豆知識を振ると、相手も話に加わりやすくなります。"},
{"id": "T08", "cat": "TRIP", "q": "奈良の大仏があることで有名な、世界遺産にも登録されているお寺は?", "choices": ["法隆寺", "清水寺", "東大寺", "金閣寺"], "answer": 2, "exp": "奈良の大仏(盧舎那仏)は東大寺の大仏殿に安置されており、世界遺産「古都奈良の文化財」の一つです。法隆寺は世界最古級の木造建築、清水寺と金閣寺は京都のお寺で、混同しやすいので注意します。「奈良の大仏=東大寺」で結び付けます。", "use": "『奈良の大仏って東大寺なんですよね、鹿とセットで一日楽しめそう』と観光プランを想像すると会話が具体的になります。"},
{"id": "T09", "cat": "TRIP", "q": "「清水の舞台」で有名な京都の世界遺産のお寺はどれ?", "choices": ["銀閣寺", "龍安寺", "清水寺", "天龍寺"], "answer": 2, "exp": "「清水の舞台から飛び降りる」の言葉で知られる高い舞台があるのは清水寺で、京都を代表する世界遺産の一つです。銀閣寺は東山文化、龍安寺は石庭、天龍寺は嵐山にあり、いずれも京都の名所ですが特徴が異なります。「清水の舞台=清水寺」で覚えます。", "use": "『清水の舞台から飛び降りる、って本当にあの舞台のことなんですよね』と言葉の由来に触れると、雑学好きの相手と盛り上がれます。"},
{"id": "T10", "cat": "TRIP", "q": "塩化物泉が「熱の湯」「温まりの湯」と呼ばれることがある理由として一般的なものは?", "choices": ["水温がとても低いから", "飲むと体温が下がるから", "無色で成分が薄いから", "塩分が肌に付いて汗の蒸発を抑え、保温効果があるとされるから"], "answer": 3, "exp": "塩化物泉は塩分を含み、入浴後に塩の成分が肌に残って汗の蒸発を抑えるため、湯冷めしにくく温まりやすいとされます。効果には個人差があります。成分が薄いのは単純温泉で、対照的です。「塩でコーティングして保温」とイメージすると覚えやすいです。", "use": "『塩化物泉は温まりの湯って言われるみたいで、冬の温泉旅行に良さそうですね』と季節と絡めると次のデートの提案にもつなげられます。"},
{"id": "T11", "cat": "TRIP", "q": "香川県の名物として全国的に有名な、コシのある麺料理はどれ?", "choices": ["きしめん", "讃岐うどん", "ほうとう", "稲庭うどん"], "answer": 1, "exp": "讃岐うどんは香川県の名物で、強いコシとなめらかな喉ごしが特徴です。きしめんは愛知の平打ち麺、ほうとうは山梨、稲庭うどんは秋田で、同じ麺類でも産地と特徴が異なります。「うどん県=香川=讃岐」で覚えると間違えにくいです。", "use": "『香川って自分でうどんを打てるお店もあるらしいですよ』と体験型の話にすると、一緒に行きたいねという流れを作りやすいです。"},
{"id": "T12", "cat": "TRIP", "q": "北海道の定番お土産として全国的に知られている、白いクッキー菓子はどれ?", "choices": ["白い恋人", "もみじ饅頭", "八ツ橋", "ずんだ餅"], "answer": 0, "exp": "「白い恋人」はホワイトチョコをラング・ド・シャで挟んだ北海道の定番土産です。もみじ饅頭は広島、八ツ橋は京都、ずんだ餅は宮城が代表的な銘菓で、産地を取り違えやすいので注意します。「白い恋人=北海道の雪のイメージ」で覚えられます。", "use": "旅行土産の話では『北海道なら白い恋人が鉄板ですよね、職場にも配りやすくて』と実用的な視点を添えると親しみやすい印象になります。"},
{"id": "T13", "cat": "TRIP", "q": "兵庫県にあり、「金泉・銀泉」と呼ばれる二種類の湯で知られる関西の名湯は?", "choices": ["城崎温泉", "有馬温泉", "南紀白浜温泉", "湯村温泉"], "answer": 1, "exp": "有馬温泉は兵庫県にあり、鉄分などで茶褐色に見える「金泉」と、無色透明の「銀泉」の二種類で有名な関西屈指の名湯です。城崎は外湯めぐり、白浜は海辺の温泉で特徴が異なります。「有馬=金泉・銀泉」の対で覚えると印象に残ります。", "use": "『有馬温泉って金泉と銀泉があって、両方入り比べできるらしいですよ』と選ぶ楽しさを伝えると、旅行の相談が具体化しやすくなります。"},
{"id": "T14", "cat": "TRIP", "q": "岐阜県にある、合掌造りの集落で有名な世界遺産はどこ?", "choices": ["富岡製糸場", "石見銀山", "熊野古道", "白川郷"], "answer": 3, "exp": "白川郷は岐阜県にあり、雪に強い急勾配の茅葺き屋根「合掌造り」の集落が世界遺産に登録されています。富岡製糸場は群馬、石見銀山は島根、熊野古道は主に和歌山で、いずれも世界遺産ですが特徴が異なります。「合掌造り=白川郷」で覚えます。", "use": "『白川郷、雪景色の合掌造りがライトアップされる時期は特に人気らしいですよ』と季節限定の魅力を伝えると旅心を刺激できます。"},
{"id": "T15", "cat": "TRIP", "q": "単純温泉の一般的な特徴として正しいものはどれ?", "choices": ["成分が比較的おだやかで肌にやさしく、幅広い人が入りやすいとされる", "刺激が強く長湯に向かない", "必ず強い匂いがする", "色が濃く黒い"], "answer": 0, "exp": "単純温泉は含まれる成分が一定量に満たないおだやかな泉質で、刺激が少なく幅広い人が入りやすいとされます。刺激が強い・匂いが強い・色が濃いといった特徴はむしろ他の泉質のもので、対照的です。「単純=クセがなくやさしい」で覚えられます。", "use": "『温泉が久しぶりなら、単純温泉のところが肌にやさしくて入りやすいみたいですよ』と相手を気遣う一言にすると好印象です。"},
{"id": "T16", "cat": "TRIP", "q": "三重県にあり、20年ごとの「式年遷宮」で知られる神社はどこ?", "choices": ["春日大社", "太宰府天満宮", "伊勢神宮", "諏訪大社"], "answer": 2, "exp": "伊勢神宮は三重県にあり、20年ごとに社殿を新しく建て替える「式年遷宮」の伝統で知られます。春日大社は奈良、太宰府天満宮は福岡、諏訪大社は長野です。「お伊勢さん=式年遷宮」と結び付けて覚えると混同を防げます。", "use": "『伊勢神宮は20年ごとに建て替える式年遷宮があるんですよね、伝統ってすごいなと思います』と敬意を示すと落ち着いた印象を与えられます。"},
{"id": "T17", "cat": "TRIP", "q": "旅の移動を安く抑えたいとき、JRの新幹線・特急が一定期間乗り放題になる代表的な切符は?", "choices": ["青春18きっぷ", "回数券", "定期券", "入場券"], "answer": 0, "exp": "青春18きっぷはJRの普通・快速列車が一日単位で乗り放題になるお得な切符で、時間をかけてのんびり旅する人に向いています。厳密には新幹線・特急は原則対象外で、この点はよくある誤解です。回数券や定期券は日常利用向けです。「鈍行でのんびり=18きっぷ」で覚えます。", "use": "『青春18きっぷでのんびり各駅停車の旅、っていうのも一度やってみたいですよね』と非日常の旅を語ると、価値観の会話に発展します。"},
{"id": "T18", "cat": "TRIP", "q": "沖縄の定番土産としても知られる、黒砂糖を使った素朴な菓子はどれ?", "choices": ["雷おこし", "南部せんべい", "かりんとう", "ちんすこう"], "answer": 3, "exp": "ちんすこうは小麦粉・砂糖・ラードを使った沖縄の伝統菓子で、定番土産として親しまれています。雷おこしは東京・浅草、南部せんべいは東北、かりんとうは全国的な駄菓子で、産地や由来が異なります。「沖縄=ちんすこう」で覚えると迷いません。", "use": "『沖縄土産ってちんすこうとか紅いもタルトとか、種類が多くて選ぶのも楽しいですよね』と選ぶ過程を共有すると会話が続きます。"},
{"id": "T19", "cat": "TRIP", "q": "旅先で天候が崩れたときの過ごし方として、無理のない選択はどれ?", "choices": ["予定を強行して屋外を回り続ける", "何もせず宿でずっと不機嫌に過ごす", "美術館・水族館など屋内施設に予定を切り替える", "相手に無断で一人で出かける"], "answer": 2, "exp": "雨の日は美術館や水族館、温泉など屋内で楽しめる場所に切り替えると、天候に左右されず快適に過ごせます。無理な強行や不機嫌な態度は同行者の負担になり、無断行動は信頼を損ねます。「雨なら屋内プランB」を用意しておく発想が旅上手の基本です。", "use": "『雨のときのために屋内の候補もいくつか調べておくと安心ですね』と一緒に代替案を考える姿勢は、思いやりが伝わって好印象です。"},
{"id": "T20", "cat": "TRIP", "q": "温泉に入る前のマナーとして一般に正しいとされるものはどれ?", "choices": ["体を洗わずそのまま湯船に入る", "かけ湯をして体を流してから湯船に入る", "湯船でタオルを洗う", "湯船に潜って泳ぐ"], "answer": 1, "exp": "入浴前は「かけ湯」で体を流し、汚れを落としてから湯船に入るのが基本のマナーです。体を洗わず入る・湯船でタオルを洗う・湯船で泳ぐ行為はいずれもマナー違反とされます。「まずかけ湯」を合言葉に覚えると、どこでも失礼になりません。", "use": "温泉旅行の話では『かけ湯してから入る、みたいな基本のマナーを自然にできる人って素敵ですよね』とさりげなく価値観を共有できます。"},
{"id": "L01", "cat": "LIFE", "q": "一年で最も昼が短く夜が長い日とされる、二十四節気の日はどれ?", "choices": ["夏至", "冬至", "春分", "秋分"], "answer": 1, "exp": "冬至は一年で昼が最も短く夜が最も長い日で、ゆず湯に入りかぼちゃを食べる風習があります。夏至はその反対で昼が最も長い日、春分・秋分は昼夜がほぼ同じ長さです。「冬至=冬の底=夜が長い」と季節感で覚えると混同しません。", "use": "冬の会話で『冬至にはゆず湯に入るといいって言いますよね、今年はやってみようかな』と季節の行事を話題にすると温かい雰囲気になります。"},
{"id": "L02", "cat": "LIFE", "q": "神社への参拝作法として一般的に正しいとされる基本の順序はどれ?", "choices": ["二礼二拍手一礼", "一礼三拍手", "拍手のみ", "黙って通り過ぎる"], "answer": 0, "exp": "多くの神社では「二礼二拍手一礼」、つまり二回お辞儀し二回手を打ち、最後に一礼するのが基本作法です(神社により異なる場合もあります)。お寺では拍手はせず静かに合掌するのが一般的で、両者の作法を混同しやすい点に注意します。「神社は拍手、お寺は合掌」で区別できます。", "use": "初詣デートなどで『神社は二礼二拍手一礼ですよね』とさりげなく作法を知っていると、落ち着いた誠実な印象を与えられます。"},
{"id": "L03", "cat": "LIFE", "q": "お花見でおなじみの桜。春に桜前線が進む方向として一般的なのはどれ?", "choices": ["北から南へ", "西から東だけ", "南から北へ", "動かない"], "answer": 2, "exp": "桜前線は暖かい南の地域から咲き始め、徐々に北上していくのが一般的です。九州や四国が早く、北海道は遅くなります。「北から南」は逆で、よくある勘違いです。「暖かい南から花が開く」と気温と結び付けて覚えると自然です。", "use": "春には『桜前線が南から北に上がっていくの、地図で見ると春が旅してるみたいで好きなんです』と情緒ある一言を添えると印象に残ります。"},
{"id": "L04", "cat": "LIFE", "q": "お盆に、ご先祖を迎えるために野菜で作る飾りとして知られるのはどれ?", "choices": ["門松", "鏡餅", "こいのぼり", "精霊馬(しょうりょううま)"], "answer": 3, "exp": "精霊馬はきゅうりを馬、なすを牛に見立てた飾りで、ご先祖が早く来て(馬)ゆっくり帰る(牛)ようにとの願いが込められています。門松は正月、鏡餅も正月、こいのぼりは端午の節句のもので季節が異なります。「お盆=きゅうりとなすの動物」で覚えられます。", "use": "『お盆のきゅうりとなすの飾り、あれ精霊馬っていう名前と意味があるんですよね』と由来を語ると、家族や故郷の話にやさしくつなげられます。"},
{"id": "L05", "cat": "LIFE", "q": "お月見(十五夜)で飾る植物として定番なのはどれ?", "choices": ["ひまわり", "ススキ", "菜の花", "コスモス"], "answer": 1, "exp": "十五夜のお月見では、稲穂に見立てたススキを飾り、月見団子を供えて秋の実りに感謝します。ひまわりは夏、菜の花は春、コスモスも秋の花ですがお月見の定番飾りはススキです。「お月見=ススキと団子」のセットで覚えると迷いません。", "use": "秋の夜には『お月見にススキを飾るのって風情がありますよね、団子も食べたくなります』と季節の情緒を共有すると会話が和みます。"},
{"id": "L06", "cat": "LIFE", "q": "神社とお寺の違いとして正しいものはどれ?", "choices": ["神社は仏像を本尊とする", "お寺は鳥居が入口の目印である", "神社は神道、お寺は仏教の施設である", "両者に違いはない"], "answer": 2, "exp": "神社は神道の施設で神様を祀り鳥居があり、お寺は仏教の施設で仏像を本尊とし山門があります。「仏像=お寺」「鳥居=神社」で、選択肢はこれを入れ替えた誤りです。「神様は神社、仏様はお寺」と主役で区別すると分かりやすいです。", "use": "寺社めぐりデートで『神社は神道、お寺は仏教で、鳥居があるのが神社なんですよね』と整理して話せると、知的で頼れる印象になります。"},
{"id": "L07", "cat": "LIFE", "q": "目上の人へ手土産を渡すときのマナーとして適切なものはどれ?", "choices": ["袋のまま片手で渡す", "玄関に置いて黙って帰る", "紙袋から出し、両手で正面を相手に向けて渡す", "値段が見えるように渡す"], "answer": 2, "exp": "手土産は原則として紙袋から出し、品物の正面を相手に向けて両手で渡すのが丁寧なマナーです。袋は持ち帰るか一言添えて渡します。片手渡しや値札を見せる行為は失礼にあたります。「袋から出して両手で正面向き」を基本形として覚えます。", "use": "『手土産って袋から出して両手で渡すのが丁寧って聞いて、意識するようにしてます』と気配りの姿勢を見せると、育ちの良さが伝わります。"},
{"id": "L08", "cat": "LIFE", "q": "「暑中見舞い」を出す時期として一般的に正しいのはどれ?", "choices": ["真冬", "梅雨入り前", "夏の暑い盛り(おおむね梅雨明けから立秋まで)", "秋の終わり"], "answer": 2, "exp": "暑中見舞いは夏の暑い盛り、おおむね梅雨明けから立秋(8月上旬頃)までに出すのが一般的です。立秋を過ぎると「残暑見舞い」に変わります。真冬に出すのは「寒中見舞い」で、季節が正反対です。「暑中=夏、寒中=冬」で対にして覚えます。", "use": "季節の便りの話では『暑中見舞いって立秋を過ぎると残暑見舞いになるんですよね』と豆知識を添えると、丁寧な人柄が伝わります。"},
{"id": "L09", "cat": "LIFE", "q": "衣類や食品の防カビ・保存の基本として適切なものはどれ?", "choices": ["湿気の多い場所にまとめて置く", "直射日光に長時間さらし続ける", "密閉して湿ったまま放置する", "風通しをよくし乾燥した状態を保つ"], "answer": 3, "exp": "カビや傷みを防ぐには、風通しをよくして湿気をためないことが基本です。湿気の多い場所やしめったままの密閉はカビの原因になり、逆効果です。「カビは湿気が好物、だから乾燥と換気」と覚えると生活の場面で応用できます。", "use": "暮らしの話題で『梅雨は風通しを意識するだけでカビ対策になるらしいですよ』と実用的な知恵を共有すると、生活力のある印象を与えられます。"},
{"id": "L10", "cat": "LIFE", "q": "3月頃の二十四節気で、冬眠していた虫が動き出す頃とされるものはどれ?", "choices": ["啓蟄(けいちつ)", "大寒", "小満", "霜降"], "answer": 0, "exp": "啓蟄は3月上旬頃の節気で、土の中で冬ごもりしていた虫が姿を現す頃を表し、春の訪れを感じさせます。大寒は一年で最も寒い時期、小満は初夏、霜降は晩秋で季節が異なります。「啓蟄=虫が目覚める春先」と情景で覚えると印象に残ります。", "use": "『啓蟄って、虫が土から出てくる頃っていう意味なんですよ』と季節の言葉を紹介すると、感性が豊かな人だと感じてもらえます。"},
{"id": "L11", "cat": "LIFE", "q": "地震などの防災の備えとして、家庭で用意しておくと良いとされるものはどれ?", "choices": ["飲料水や非常食の備蓄", "高い家具を固定せず放置", "懐中電灯を使わず処分", "避難経路を確認しない"], "answer": 0, "exp": "防災の基本は、飲料水や非常食の備蓄、家具の固定、懐中電灯の準備、避難経路の確認です。家具を固定しない・明かりを処分する・経路を確認しないのは危険を高める逆の行動です。「水・食料・明かり・固定・経路」をセットで覚えると備えの抜けを防げます。", "use": "『防災バッグ、お互い準備しておくと安心ですよね』と相手の暮らしを気遣う話題にすると、堅実で頼れる一面を伝えられます。"},
{"id": "L12", "cat": "LIFE", "q": "「立春」が表すおおよその時期として正しいものはどれ?", "choices": ["春が終わり夏になる頃", "暦のうえで春が始まる頃(2月初め)", "梅雨が明ける頃", "紅葉が始まる頃"], "answer": 1, "exp": "立春は暦のうえで春が始まるとされる日で、2月4日頃にあたります。前日が節分で、豆まきをして新しい季節を迎えます。実際の気候はまだ寒いことが多く、そこが誤解されやすい点です。「節分の翌日が立春」と行事とセットで覚えます。", "use": "『立春って暦だと春の始まりなんですよね、まだ寒いのに言葉が先に春になるのが面白いです』と季節のずれを語ると会話が深まります。"},
{"id": "L13", "cat": "LIFE", "q": "お祝い事(結婚など)のご祝儀袋の水引の結び方として適切なものはどれ?", "choices": ["すぐほどける蝶結び", "結ばずに開けたまま", "一度きりを願う結び切り", "ガムテープで留める"], "answer": 2, "exp": "結婚祝いなど一度きりであってほしい慶事には、簡単にはほどけない「結び切り」の水引を使います。蝶結びは何度あってもよい出産・入学祝いなどに用いるため、結婚では避けます。「結婚は結び切り、繰り返しは蝶結び」で使い分けを覚えます。", "use": "『結婚祝いは結び切りの水引を選ぶんですよね』とマナーを知っていると、将来を見据えた誠実な印象をさりげなく伝えられます。"},
{"id": "L14", "cat": "LIFE", "q": "旬の食材として、秋を代表する味覚とされるものはどれ?", "choices": ["たけのこ", "さんま・栗・さつまいも", "そうめん", "新玉ねぎ"], "answer": 1, "exp": "さんまや栗、さつまいもは秋を代表する旬の味覚で、「食欲の秋」を彩ります。たけのこや新玉ねぎは春、そうめんは夏の定番で、季節が異なります。「秋刀魚の刀の字は秋」と漢字で覚えると旬の季節を間違えにくくなります。", "use": "『秋はさんまや栗が美味しくなりますよね、旬のものを食べに行くのも楽しそう』と食の話にすると、次のデートの誘いにつなげやすいです。"},
{"id": "L15", "cat": "LIFE", "q": "お通夜や葬儀での服装マナーとして適切なものはどれ?", "choices": ["明るい色の華やかな服", "露出の多い服", "派手なアクセサリー", "黒を基調とした落ち着いた喪服"], "answer": 3, "exp": "弔事では黒を基調とした落ち着いた喪服を着るのが基本で、光沢や派手なアクセサリー、露出は避けます。明るい色や華やかな装いは慶事向けで、弔事にはふさわしくありません。「お悔やみの場は控えめな黒」を基準に判断すると失礼を避けられます。", "use": "冠婚葬祭の話題では『こういう場のマナーはきちんとしていたいですよね』と価値観をさりげなく共有すると、信頼感につながります。"},
{"id": "L16", "cat": "LIFE", "q": "梅雨(つゆ)の時期として一般的に正しいのはどれ?", "choices": ["おおむね6月から7月頃", "1月から2月頃", "9月から10月頃", "12月頃"], "answer": 0, "exp": "梅雨はおおむね6月から7月にかけての長雨の時期で、地域により多少前後します(北海道は梅雨がないとされます)。1月や12月は真冬、9〜10月は秋雨の時期で異なります。「梅の実が熟す頃=梅雨=初夏」と語源で覚えると定着します。", "use": "『梅雨の時期って気分も沈みがちだから、雨の日に楽しめる場所を見つけておきたいですね』と前向きな提案にすると好感を持たれます。"},
{"id": "L17", "cat": "LIFE", "q": "換気の効率を上げるコツとして適切なものはどれ?", "choices": ["窓を一か所だけ開ける", "すべて閉め切る", "エアコンを止めて放置する", "対角線上の窓や扉を二か所開けて風の通り道を作る"], "answer": 3, "exp": "換気は入口と出口の二か所を開けて空気の通り道を作ると効率よく行えます。一か所だけでは空気が流れにくく、閉め切りは換気になりません。「二か所開けて風を通す」を基本に、対角線上を意識すると効果的です。生活の質を保つ基本の知恵です。", "use": "『部屋の換気って二か所開けると一気に空気が入れ替わるらしいですよ』と暮らしの小ワザを共有すると、気の利く人という印象になります。"},
{"id": "L18", "cat": "LIFE", "q": "「一年の締めくくり」に食べる縁起物として大晦日の定番はどれ?", "choices": ["柏餅", "ちまき", "七草がゆ", "年越しそば"], "answer": 3, "exp": "大晦日には、細く長い麺に長寿を願う「年越しそば」を食べる習慣があります。柏餅とちまきは端午の節句、七草がゆは1月7日の行事食で、それぞれ季節が異なります。「大晦日=そばで長く」と願いの意味とセットで覚えると忘れにくいです。", "use": "年末には『年越しそばって長生きの願いが込められてるんですよね』と行事の意味に触れると、季節を大切にする人柄が伝わります。"},
{"id": "L19", "cat": "LIFE", "q": "1月7日に無病息災を願って食べるとされる行事食はどれ?", "choices": ["七草がゆ", "恵方巻き", "ちらし寿司", "おはぎ"], "answer": 0, "exp": "1月7日には春の七草を入れた「七草がゆ」を食べ、正月疲れの胃を休め無病息災を願う習慣があります。恵方巻きは節分、ちらし寿司はひな祭り、おはぎは春秋のお彼岸に食べるもので、時期が異なります。「1月7日=七草がゆ」と日付で覚えます。", "use": "『七草がゆって、お正月で疲れた胃を休める意味もあるらしいですよ』と健康を気遣う豆知識にすると、思いやりが感じられます。"},
{"id": "L20", "cat": "LIFE", "q": "贈り物を渡すときの心づかいとして、最も好ましいものはどれ?", "choices": ["高価さを強調して恩を着せる", "相手の好みや状況を考えて選び、気持ちよく受け取れる形で渡す", "余り物を適当に渡す", "見返りを前提に渡す"], "answer": 1, "exp": "贈り物は値段よりも、相手の好みや状況を思って選び、負担にならない形で渡す心づかいが大切です。高価さの強調や見返り前提は相手を気詰まりにさせ、逆効果になります。「主役は相手の気持ち」を基準にすると、贈り物選びで失敗しにくくなります。", "use": "『プレゼントって、値段より相手が喜ぶかどうかで選びたいですよね』と価値観を語ると、誠実で思いやりのある人柄が自然に伝わります。"},
{"id": "K01", "cat": "LOVE", "q": "相手の話を聞くとき、まず心がけたいことは？", "choices": ["自分の似た体験をすぐ話す", "相手が話し終わるまで待ち相づちを打つ", "次に何を言うか考えておく", "アドバイスを用意しておく"], "answer": 1, "exp": "傾聴の基本は「まず最後まで聞く」ことです。話をかぶせたり体験を返すと会話の主役が自分になってしまいます。アドバイスも求められる前は不要です。相手が話し終わるまで待ち、うなずきや「そうなんですね」で受け止める。この受け身の姿勢が安心感を生みます。「聞く7割・話す3割」と覚えましょう。", "use": "相手が話している間はスマホを見ず、体を向けて「うんうん」「へえ」と軽くうなずくだけで十分伝わります。"},
{"id": "K02", "cat": "LOVE", "q": "「オウム返し」の正しい使い方は？", "choices": ["相手の言葉をそっくり全部繰り返す", "反対意見を付け加えて返す", "話題を変えるために使う", "相手のキーワードを短く返して受け止める"], "answer": 3, "exp": "オウム返しは相手の言葉の中心となる一語を短く返す技です。全部繰り返すとくどく不自然になり、反対意見を足すと否定に聞こえます。「最近ジムに通ってて」→「ジムいいですね」のように核だけ拾うと、聞いてもらえた実感を与えられます。「キーワードを一つ拾う」と覚えましょう。", "use": "相手「先週京都に行って」に対し「京都いいですね、どこ回ったんですか？」と返すと自然に会話が続きます。"},
{"id": "K03", "cat": "LOVE", "q": "会話を広げやすい「開いた質問」はどれ？", "choices": ["お酒は飲みますか？", "週末は出かけましたか？", "休日はどんな風に過ごすことが多いですか？", "甘いものは好きですか？"], "answer": 2, "exp": "「はい/いいえ」で終わらない質問を開いた質問(オープンクエスチョン)と呼びます。他の3つは一言で終わる閉じた質問で、会話が続きにくいです。「どんな風に」「どうして」と尋ねると相手が自由に話せます。ただし初対面でいきなり重い質問は避け、答えやすい話題から広げましょう。「5W1Hで聞く」と覚えます。", "use": "「休日はどう過ごすことが多いですか？」と聞けば、相手の趣味やライフスタイルが自然に見えてきます。"},
{"id": "K04", "cat": "LOVE", "q": "閉じた質問(はい/いいえで答える質問)が役立つ場面は？", "choices": ["会話の序盤で緊張をほぐしたいとき", "相手を質問攻めにしたいとき", "沈黙を避けるためひたすら使う", "相手の意見を封じたいとき"], "answer": 0, "exp": "閉じた質問は答えるハードルが低く、序盤の緊張をほぐすのに向いています。「コーヒーは好きですか？」なら誰でも即答できます。ただし連発すると尋問のようになるので、答えの後は開いた質問で広げるのがコツです。「閉じてから開く」の順番を覚えましょう。相手を封じる使い方は本末転倒です。", "use": "最初に「コーヒー派ですか、紅茶派ですか？」と軽く聞き、答えに「私も！実は…」と自己開示をつなげます。"},
{"id": "K05", "cat": "LOVE", "q": "自己開示のバランスとして望ましいのは？", "choices": ["相手の話を待たず自分の話ばかりする", "一切自分の話はしない", "相手の開示に合わせて少しずつ自分も話す", "初対面で重い過去を全部話す"], "answer": 2, "exp": "自己開示は「返報性」が働き、相手が話した分だけ自分も開くと信頼が深まります。話しすぎは自分本位に、話さなすぎは壁に感じられます。初対面で重い話は相手を戸惑わせるので段階的に。相手が趣味を話したら自分の趣味を返す、というキャッチボールが理想です。「相手と同じ深さで返す」と覚えましょう。", "use": "相手が仕事の悩みを少し話したら「わかります、私も前に…」と同程度の話を返すと距離が縮まります。"},
{"id": "K06", "cat": "LOVE", "q": "相手を褒めるときに好印象なのは？", "choices": ["容姿だけを繰り返し褒める", "高価な持ち物をうらやむ", "相手の選択や行動に触れて褒める", "他人と比べて褒める"], "answer": 2, "exp": "「その店を選ぶセンスいいですね」のように行動や選択を褒めると、内面を見てくれたと感じてもらえます。容姿だけの連発は軽薄に、持ち物への羨望は下心に、比較は失礼に映ります。努力や気配りに目を向けるのがコツです。「見た目より選択を褒める」と覚えましょう。具体的であるほど言葉に説得力が出ます。", "use": "「待ち合わせ場所、すごく分かりやすいところにしてくれてありがとうございます」と相手の配慮を言葉にします。"},
{"id": "K07", "cat": "LOVE", "q": "初対面のデートで避けたい話題は？", "choices": ["好きな食べ物", "最近見た映画やドラマ", "年収や貯金額の詮索", "休日の過ごし方"], "answer": 2, "exp": "年収や貯金の詮索は初対面では失礼で、相手を品定めしている印象を与えます。食べ物・映画・休日の話は安全で盛り上がりやすい定番です。お金や条件の話は関係が深まってから自然に出るもの。最初は「一緒にいて楽しいか」を確かめる時間にしましょう。「初回はお金と条件を聞かない」と覚えます。", "use": "収入が気になっても直接は聞かず、「お仕事は忙しいですか？」など働き方の話からやんわり知るに留めます。"},
{"id": "K08", "cat": "LOVE", "q": "会話中に元恋人の話が出たとき、望ましい対応は？", "choices": ["自分の元恋人の話も詳しく語る", "相手の元恋人を根掘り葉掘り聞く", "深追いせず今の話題に戻す", "相手の元恋人を悪く言う"], "answer": 2, "exp": "元恋人の話は地雷になりやすく、深追いも自分語りも印象を下げます。相手が少し触れても「そうだったんですね」と受け止め、自然に今の話題へ戻すのが大人の対応です。過去を詮索せず、目の前の相手に興味を向けましょう。「元恋人は掘らない・語らない」と覚えます。悪口は人柄を疑われます。", "use": "相手が元恋人に触れたら「いろいろあったんですね。ところで…」と受け止めつつ明るい話題へ切り替えます。"},
{"id": "K09", "cat": "LOVE", "q": "自慢話ばかりする人が敬遠される理由は？", "choices": ["謙虚さがなく聞き役に回れないから", "知識が豊富すぎるから", "声が大きいから", "話が長いから"], "answer": 0, "exp": "自慢話が続くと「聞いてほしい」気持ちばかりが伝わり、相手への関心が感じられません。会話は相互のもので、自分を大きく見せるより相手に興味を向ける方が好かれます。実績は聞かれたら控えめに答える程度で十分です。「すごさより聞く姿勢」と覚えましょう。魅力は自分で言うより相手が気づくものです。", "use": "仕事の成果を話したくなったら一言で抑え、「あなたはどんなお仕事を？」と相手に話を渡します。"},
{"id": "K10", "cat": "LOVE", "q": "マッチングアプリの最初のメッセージで効果的なのは？", "choices": ["「はじめまして」だけ送る", "プロフィールの具体的な一点に触れて質問する", "定型文をコピペで送る", "すぐに連絡先を聞く"], "answer": 1, "exp": "「プロフィールのカフェ巡りの写真、素敵ですね。おすすめありますか？」のように具体的に触れると、ちゃんと読んだ誠実さが伝わり返信率が上がります。「はじめまして」だけや定型文は埋もれ、いきなり連絡先を聞くのは警戒されます。相手の情報を一つ拾って質問にするのがコツです。「読んだ証拠を一つ入れる」と覚えます。", "use": "相手の好きな料理の記載を見て「私も和食好きです!おすすめのお店ありますか？」と質問形で送ります。"},
{"id": "K11", "cat": "LOVE", "q": "やり取りが続いているアプリで、デートに誘うタイミングは？", "choices": ["メッセージ交換が1往復した直後", "相手が忙しいと言った直後", "何ヶ月もメッセージだけ続けた後", "会話が弾み共通の話題が出てきた頃"], "answer": 3, "exp": "共通の話題で盛り上がった頃が自然な誘い時です。早すぎると軽く見られ、逆にメッセージだけ長引くと熱が冷めたり相手が疲れたりします。「その話、詳しく聞きたいので今度お茶しませんか？」と会話の流れに乗せると断られにくいです。「盛り上がりに乗せて誘う」と覚えましょう。", "use": "共通の趣味が見つかったら「その展示、私も気になってました。よければ一緒に行きませんか？」と誘います。"},
{"id": "K12", "cat": "LOVE", "q": "デートのお礼メッセージで好印象なのは？", "choices": ["当日中に具体的な感想を添えて送る", "一週間後にまとめて送る", "「ありがとうございました」だけ送る", "次のデートの約束を一方的に決める"], "answer": 0, "exp": "当日中に「今日の〇〇のお店、すごく美味しかったです。ありがとうございました」と具体的な感想を添えると、楽しかった気持ちが伝わります。定型のお礼だけでは温度が薄く、遅すぎると熱が冷めます。約束の押しつけも相手のペースを奪います。「その日のうちに具体的に」と覚えましょう。", "use": "帰宅後に「今日は楽しかったです。話に出た本、さっそく探してみますね」と具体的な一言を添えます。"},
{"id": "K13", "cat": "LOVE", "q": "心理学でいう「単純接触効果」とは？", "choices": ["会う回数が増えるほど好感を持ちやすい", "高価な物を贈ると好かれる", "一度で強く印象づければ良い", "接触を減らすほど恋しくなる"], "answer": 0, "exp": "単純接触効果(ザイオンス効果)は、繰り返し接するほど親しみや好感が増す心理です。だから短くても連絡や顔合わせを重ねる方が、一度の派手な演出より効果的です。ただし相手が負担に感じる頻度は逆効果なので、無理のない範囲で。「回数が親しみを育てる」と覚えましょう。贈り物や一発勝負に頼る話ではありません。", "use": "毎日長文を送るより、短くても「おつかれさま」と無理のない頻度で連絡を続ける方が親しみが増します。"},
{"id": "K14", "cat": "LOVE", "q": "「類似性の法則」を会話に活かす方法は？", "choices": ["共通点を見つけて話題にする", "相手と違う点を強調する", "相手に合わせて嘘の趣味を作る", "自分の主張を貫く"], "answer": 0, "exp": "人は自分と似た相手に好意を抱きやすく、これを類似性の法則と呼びます。出身地・好きな食べ物・価値観など共通点が見つかると一気に距離が縮まります。ただし嘘で合わせると後で苦しくなるので、本当の共通点を探すのが誠実です。「共通点を一緒に見つける」と覚えましょう。違いは違いで尊重すれば十分です。", "use": "「実は私も甘党なんです!」と本当の共通点が出たら、そこを起点に好きな店の話へ広げます。"},
{"id": "K15", "cat": "LOVE", "q": "「返報性の原理」の恋愛での正しい使い方は？", "choices": ["高価なプレゼントで見返りを迫る", "好意を示したら必ず見返りを求める", "相手に尽くさせる", "自分が心を開くと相手も開きやすくなる"], "answer": 3, "exp": "返報性の原理は「何かを受け取ると返したくなる」心理で、恋愛では自己開示が代表例です。自分が少し心を開くと相手も安心して開いてくれます。ただし見返りを要求する道具にすると打算的で嫌われます。あくまで信頼のきっかけとして使うのが誠実です。「与えるのは見返り目的でない」と覚えましょう。", "use": "「人見知りなんです」と軽く弱みを見せると、相手も「実は私も」と打ち解けてくれやすくなります。"},
{"id": "K16", "cat": "LOVE", "q": "相手の長い話を受けて会話をまとめる「要約」の効果は？", "choices": ["話を早く切り上げられる", "理解と関心が伝わり相手が安心する", "自分の記憶力を誇示できる", "相手を訂正できる"], "answer": 1, "exp": "「つまり新しい環境で頑張ってこられたんですね」と要約すると、ちゃんと聞いて理解した証になり相手は安心します。話を切るためや訂正のために使うと逆効果です。要約は相手の言葉を否定せず、要点を優しくなぞるのがコツです。「聞いた証としてまとめる」と覚えましょう。深い共感を示せる上級の傾聴技術です。", "use": "相手が転職の経緯を話し終えたら「大きな決断をされたんですね」とまとめて受け止めます。"},
{"id": "K17", "cat": "LOVE", "q": "話題を「横に展開する」とは？", "choices": ["同じ話を繰り返す", "話を深く掘り下げ続ける", "相手の話を遮って変える", "一つの話題から関連する別の話題へつなぐ"], "answer": 3, "exp": "横展開は「旅行が好き」→「じゃあ写真も撮りますか？」のように関連話題へ広げる技です。深掘り(縦)ばかりだと尋問っぽくなり、話が尽きたときは横に広げると呼吸ができます。関連の糸をたどるのがコツで、無理に遮る切り替えとは違います。「縦に掘って横に広げる」と覚えましょう。会話に立体感が出ます。", "use": "「カフェ巡りが好き」と聞いたら「読書もされます？カフェで読むと落ち着きますよね」と関連へ広げます。"},
{"id": "K18", "cat": "LOVE", "q": "デート中に沈黙が訪れたときの望ましい対応は？", "choices": ["焦って無理に話題を連発する", "気まずさを隠そうと相手を質問攻めにする", "目の前の物や状況を話のきっかけにする", "スマホをいじる"], "answer": 2, "exp": "沈黙は悪いものではなく、「この料理きれいですね」と目の前の物を話題にすれば自然に再開できます。焦った連発や質問攻めは相手を疲れさせ、スマホは興味がないサインに映ります。沈黙を恐れず、五感で感じたことを口にするのがコツです。「目の前を実況する」と覚えましょう。少しの間は自然なものです。", "use": "会話が途切れたら「この店、照明がおしゃれですね」と今見えている物を素直に口にします。"},
{"id": "K19", "cat": "LOVE", "q": "うっかり失礼なことを言ってしまったときのリカバリーは？", "choices": ["なかったことにして話を進める", "素直に謝って言い直す", "冗談だったと押し通す", "相手のせいにする"], "answer": 1, "exp": "「すみません、言い方が悪かったです」と素直に認めて言い直すのが最も信頼を保ちます。ごまかしや冗談での押し通し、責任転嫁はかえって印象を悪くします。誰でも失言はするもので、誠実な訂正は逆に人柄の良さを伝えます。「素直に認めて直す」と覚えましょう。取り繕うより正直さが好かれます。", "use": "失言に気づいたら「今の、誤解を招く言い方でしたね。ごめんなさい」とすぐ認めて言い直します。"},
{"id": "K20", "cat": "LOVE", "q": "LINEのやり取りを心地よく続けるコツは？", "choices": ["長文を毎回送る", "即レスを相手にも求める", "一日に何十通も送る", "相手の返信ペースや文量に合わせる"], "answer": 3, "exp": "相手が短めなら自分も短く、返信が翌日なら急かさず待つ、と相手のペースに合わせると心地よさが続きます。長文の連投や即レス要求、大量送信は相手を疲れさせます。会話はキャッチボールで、相手が受け取りやすい球を返すのがコツです。「相手の球に合わせて返す」と覚えましょう。無理のなさが長続きの秘訣です。", "use": "相手が一行なら自分も一〜二行で返し、返信が遅くても「忙しいのかな」と受け止めて待ちます。"}
/*__QUIZ_END__*/];
const SCENES=[
{"id": "SC1", "title": "マッチングアプリの初回メッセージ", "desc": "気になる相手にマッチング。プロフィールを読んで最初の一通を送る場面。", "steps": [{"partner": "（プロフィール：休日はカフェ巡りと美術館。最近は器の展示に行きました。）マッチありがとうございます！", "note": "相手のプロフィールを踏まえた最初の返信を選ぶ。", "choices": [{"t": "マッチありがとうございます。器の展示、素敵ですね。どんな器に惹かれましたか？", "s": 2, "fb": "プロフィールを読んだ証拠を示しつつ、答えを広げやすい質問で返せています。相手は「見てくれている」と感じ、話しやすくなります。"}, {"t": "こちらこそありがとうございます！よろしくお願いします。", "s": 1, "fb": "丁寧で悪くありませんが、当たり障りがなく会話の糸口がありません。相手の興味に一歩触れると返信率が上がります。"}, {"t": "美人（イケメン）でびっくりしました！タイプです。", "s": 0, "fb": "褒めたい気持ちは分かりますが、外見だけの評価は品定めの印象を与えがち。まず人柄や趣味に関心を向ける方が誠実に伝わります。"}]}, {"partner": "器、実は集め始めたばかりなんです。手仕事の温かみに惹かれて。", "choices": [{"t": "手仕事の温かみ、分かる気がします。使うたびに気分が上がりそうですね。", "s": 2, "fb": "相手の言葉を受け止めて共感し、情景まで想像を広げられています。傾聴の基本ができていて安心感を与えます。"}, {"t": "へえ、器って高いんですよね？いくらくらいするんですか？", "s": 1, "fb": "関心は伝わりますが値段の話は無粋になりがち。まず気持ちに共感してから素朴な疑問を挟むと自然です。"}, {"t": "僕（私）は全然詳しくないので分からないです。", "s": 0, "fb": "正直さは大事ですが、そこで止まると会話が途切れます。詳しくなくても『どこが好きか教えて』と委ねれば話は続きます。"}]}, {"partner": "ちなみに休日はどんなふうに過ごしていますか？", "choices": [{"t": "最近はカフェで読書することが多いです。〇〇さんもカフェ巡り好きですよね、おすすめありますか？", "s": 2, "fb": "自己開示で自分を見せつつ、相手のプロフィールに絡めて質問を返せています。会話のキャッチボールが理想的です。"}, {"t": "だいたい家でゴロゴロしてます。特に趣味もなくて。", "s": 1, "fb": "素直さは好印象ですが、自己卑下で終わると相手が広げにくい。小さくても好きなことを一つ添えると弾みます。"}, {"t": "仕事が忙しくて休日もほぼ働いてます。", "s": 0, "fb": "多忙アピールは『会えなさそう』『余裕がなさそう』と映ることも。まず前向きな一面を見せる方が関係は進みます。"}]}, {"partner": "読書いいですね。私も好きです。最近読んだ本でおすすめありますか？", "choices": [{"t": "エッセイをよく読みます。〇〇さんはどんなジャンルが好きですか？共通点あったら嬉しいです。", "s": 2, "fb": "自分の好みを軽く開示しつつ相手にボールを返し、共通点への期待も添えられています。距離が縮まる返し方です。"}, {"t": "タイトルは忘れちゃいましたが、面白いのがありました。", "s": 1, "fb": "会話は続きますが具体性がなく印象に残りません。ジャンルや一言感想でもあると相手が反応しやすくなります。"}, {"t": "本の話はメッセージだと長くなるので、会ったときに。", "s": 0, "fb": "早く会いたい気持ちは分かりますが、話題を打ち切る形になり相手は少し寂しく感じます。今の話題も楽しんでから誘いましょう。"}]}, {"partner": "共通点あると嬉しいですね。話しやすくてよかったです。", "choices": [{"t": "僕（私）も楽しいです。よかったら今度お茶でも、無理のない範囲で会えたら嬉しいです。", "s": 2, "fb": "気持ちを共有し、相手の負担に配慮しながら自然に次へ誘えています。押しつけがましさがなく好印象です。"}, {"t": "ですね！これからもよろしくお願いします。", "s": 1, "fb": "感じは良いですが、盛り上がった流れを次に繋げられていません。会話が温まった今が誘いどきです。"}, {"t": "じゃあ今週末さっそく会いましょう！何時が空いてますか？", "s": 0, "fb": "勢いは良いのですが数往復で即日程調整は急ぎすぎ。相手が引くことも。まず『会えたら』と余白を残す方が安心されます。"}]}], "endings": {"high": "〇〇さんから『メッセージ楽しかったです、ぜひお茶しましょう』と弾んだ返信が。あなたの、相手を見て言葉を選ぶ姿勢が伝わり、会う約束まで自然に繋がりました。丁寧な第一歩は最高の土台です。", "mid": "やり取りは穏やかに続きました。あなたの誠実さは伝わっていますが、あと一歩、相手の話題に絡めた質問や自己開示があると距離が縮まります。次は『相手を広げる質問』を意識しましょう。", "low": "会話が少し途切れがちでした。落ち込まないで。初回は『相手のプロフィールを読んだ一言』と『答えやすい質問』の二つがあれば十分。外見評価や多忙アピールより、相手の興味に寄り添う一言を意識してみましょう。"}},
{"id": "SC2", "title": "初対面のカフェお見合い", "desc": "アプリで知り合った相手と初めて対面。緊張の挨拶から打ち解けるまで。", "steps": [{"partner": "（少し緊張した様子で）はじめまして。〇〇です、今日はよろしくお願いします。", "note": "第一印象を決める最初のひとこと。", "choices": [{"t": "はじめまして、〇〇です。お会いできて嬉しいです。緊張しますね、お互い（笑）", "s": 2, "fb": "笑顔で歓迎を伝えつつ、緊張を共有して相手を安心させています。『お互い』の一言が対等で温かい雰囲気を作ります。"}, {"t": "どうも。写真より実物のほうがいいですね。", "s": 1, "fb": "褒め言葉ですが『写真より』は元の印象を下げる含みも。素直に『お会いできて嬉しい』と伝える方が安全です。"}, {"t": "（緊張で）……よろしくお願いします。（うつむく）", "s": 0, "fb": "緊張は自然なことですが、目を合わせず沈むと相手も不安に。無理に明るくせずとも、顔を上げ一言添えるだけで印象が変わります。"}]}, {"partner": "ここのカフェ、雰囲気いいですね。よく来られるんですか？", "choices": [{"t": "実は下見に来て気に入ったんです。〇〇さんに気に入ってもらえたら嬉しいなと思って。", "s": 2, "fb": "さりげない気遣いを自然に開示できています。『あなたのために選んだ』が押しつけなく伝わり、誠実さが光ります。"}, {"t": "いえ、初めてです。ネットで適当に探しました。", "s": 1, "fb": "正直で悪くありませんが『適当』は少し残念。『評判が良さそうで選んだ』と言えば同じ事実でも印象が上がります。"}, {"t": "はい、いつも来てます。常連なんで店員とも仲良くて。", "s": 0, "fb": "親しみを見せたい気持ちは分かりますが、初対面では自分語りより相手への関心を。事実でなければ見栄は後で苦しくなります。"}]}, {"partner": "お仕事は何をされているんですか？", "choices": [{"t": "〇〇関係の仕事です。人と関わる場面が多くて。〇〇さんのお仕事も気になります。", "s": 2, "fb": "簡潔に自己開示し、すぐ相手に関心を返せています。仕事の話を独占せず双方向にする姿勢が好印象です。"}, {"t": "まあ普通の会社員です。特に面白い話もないですよ。", "s": 1, "fb": "謙遜も度が過ぎると会話が痩せます。小さくてもやりがいや日常を一言添えると、相手が質問しやすくなります。"}, {"t": "かなり稼げる仕事ですよ。年収は同世代よりだいぶ上で。", "s": 0, "fb": "安心材料を示したいのでしょうが、収入誇示は品定めの空気を作ります。まず人柄が伝わる話題を選ぶ方が信頼されます。"}]}, {"partner": "人と関わるお仕事、素敵ですね。大変なこともありそう。", "choices": [{"t": "ありますね（笑）でも人に感謝される瞬間が好きで続けてます。〇〇さんはどんな時にやりがいを感じますか？", "s": 2, "fb": "苦労を認めつつ前向きな軸を見せ、同じ問いを相手に返せています。深い話へ自然に橋渡しする上手な返しです。"}, {"t": "大変ですけど、まあ慣れですね。", "s": 1, "fb": "落ち着きは伝わりますが話が広がりません。『こんな時が大変』と具体を一つ出すと相手が共感しやすくなります。"}, {"t": "正直しんどいことばかりで、辞めたいと思ってます。", "s": 0, "fb": "本音を打ち明けたくなる気持ちは分かりますが、初対面での愚痴は重い印象に。前向きな面を先に見せるのが安全です。"}]}, {"partner": "（少し打ち解けて）なんだか話しやすいですね、〇〇さんって。", "choices": [{"t": "よかった、緊張してたので嬉しいです。〇〇さんが聞き上手だからかも。", "s": 2, "fb": "素直に喜びを見せ、相手を立てる一言で締めています。感謝を相手に返すことで温かい空気が循環します。"}, {"t": "そうですか？ありがとうございます。", "s": 1, "fb": "感じは良いですが受け身で終わっています。相手が投げてくれた好意に、こちらからも一言返すと関係が深まります。"}, {"t": "よく言われます、コミュ力高いって。", "s": 0, "fb": "照れ隠しでしょうが自己評価の押し出しは鼻につくことも。褒められたら相手の良さに言及して返すと好感が続きます。"}]}], "endings": {"high": "別れ際、〇〇さんは『今日は本当に楽しかった、また会いたいです』と笑顔に。あなたの気遣いと聞く姿勢が緊張を溶かし、初対面とは思えない空気を作りました。次に繋がる最高のお見合いです。", "mid": "会話は無事に進み、悪くない印象を残せました。ただ自己開示か相手への質問がもう少しあると、心の距離が縮まります。次は『苦労も前向きに見せる』『褒められたら相手に返す』を意識しましょう。", "low": "少しぎこちない時間になりました。大丈夫、初対面は誰でも緊張します。ポイントは、目を見て一言添えること、収入や愚痴より人柄が伝わる話題を選ぶこと。次はきっと自然に話せます。"}},
{"id": "SC3", "title": "食事デートの注文と会話", "desc": "少し良いレストランで食事デート。料理やお酒の話題を広げる場面。", "steps": [{"partner": "メニュー迷いますね。〇〇さん、お酒は飲まれますか？", "note": "ワインや料理の知識を自然に使える場面。", "choices": [{"t": "少し飲みます。今日の料理和食寄りなので、すっきりした白かスパークリングが合いそう。〇〇さんの好みは？", "s": 2, "fb": "知識を披露で終わらせず相手の好みを尋ねて主役を譲れています。ペアリングの提案が自然で、押しつけがましさもありません。"}, {"t": "飲みますよ。ワインは詳しいので任せてください、いいの選びます。", "s": 1, "fb": "頼もしさはありますが『任せて』が一方的に。相手の好みを聞いてから選ぶと、同じ知識でも思いやりとして伝わります。"}, {"t": "飲めますけど、正直銘柄とか全然分からなくて適当でいいです。", "s": 0, "fb": "気取らないのは良さですが投げやりだと味気ない。『詳しくないので一緒に選びたい』と言えば、分からなさも親しみに変わります。"}]}, {"partner": "じゃあ白ワインにしましょうか。私も詳しくないんですけど。", "choices": [{"t": "辛口だと料理の邪魔をしないので頼みやすいですよ。乾杯のあと感想を教えてください。", "s": 2, "fb": "知識をやさしい言葉で共有し、相手を評価者として立てています。専門用語を並べず相手の体験に繋げる配慮が上手です。"}, {"t": "このシャルドネは樽熟成でバターのようなニュアンスが特徴で…", "s": 1, "fb": "知識は本物ですが、相手が『詳しくない』と言った直後の専門講義は距離を作ります。相手の目線に合わせる方が魅力的です。"}, {"t": "どれでもいいんじゃないですか、味なんて気分ですし。", "s": 0, "fb": "リラックスさせたいのかもしれませんが、選ぶ楽しみを流してしまいます。一緒に迷う時間こそデートの醍醐味です。"}]}, {"partner": "（乾杯して）ん、おいしい。お料理も来ましたね。", "choices": [{"t": "よかった。この前菜、出汁が効いてますね。〇〇さんは和食とか好きですか？", "s": 2, "fb": "料理の感想を具体的に共有し、そこから相手の嗜好へ話を広げられています。五感の体験を分かち合う理想的な流れです。"}, {"t": "うまいですね。（黙々と食べる）", "s": 1, "fb": "共感の一言は良いのですが、そこで会話が止まっています。料理は話題の宝庫。味や食材に触れて一歩広げましょう。"}, {"t": "僕（私）の行きつけの店はもっと美味いですよ。今度連れて行きます。", "s": 0, "fb": "次に誘いたい気持ちは分かりますが、今の店を下げるのは相手にも失礼。まず目の前の一皿を一緒に楽しむのが誠実です。"}]}, {"partner": "和食好きです。実家がわりと和食中心で育ったので。", "choices": [{"t": "いいですね、そういう食卓。おふくろの味というか、思い出の一品ってありますか？", "s": 2, "fb": "背景に共感し、相手の思い出を引き出す質問へ繋げています。食から人生の物語へ広げる、深掘りの好例です。"}, {"t": "へえ、料理できるんですね。今度作ってほしいな。", "s": 1, "fb": "親しみは伝わりますが早い段階で『作って』は距離感を誤ることも。まず相手の話を掘り下げてからの方が自然です。"}, {"t": "和食って地味じゃないですか？僕（私）は肉が好きで。", "s": 0, "fb": "自分の好みは大事ですが、相手のルーツを否定する形はもったいない。違いは『そうなんだ、教えて』と面白がる方が縁が育ちます。"}]}, {"partner": "思い出の一品かあ…祖母の作る筑前煮ですね。今でも恋しくて。", "choices": [{"t": "素敵な思い出ですね。大事な味なんだなって伝わってきます。話してくれて嬉しいです。", "s": 2, "fb": "エピソードを丁寧に受け止め、開示してくれたことへの感謝まで添えています。相手は『分かってもらえた』と深い安心を覚えます。"}, {"t": "筑前煮いいですね。レシピ知ってるので今度作りますよ。", "s": 1, "fb": "善意は伝わりますが、しんみりした思い出話をレシピの実務に着地させると温度差が。まず気持ちに寄り添いましょう。"}, {"t": "へえ。ところで次何頼みます？", "s": 0, "fb": "間を持たせたい気持ちは分かりますが、心を開いた瞬間に話題を変えると突き放した印象に。一呼吸、共感を返しましょう。"}]}], "endings": {"high": "〇〇さんは『こんなに話を聞いてもらえたの久しぶり』と目を細めました。料理やお酒の知識をさりげなく分かち合い、相手の思い出まで引き出したあなた。食卓が心の距離をぐっと縮めた夜になりました。", "mid": "食事は和やかに進みました。知識や気遣いは光りましたが、時々自分本位になった場面も。次は『相手の目線に合わせる』『思い出話には共感を先に』を意識すると、もっと深い時間になります。", "low": "少し噛み合わない場面がありました。落ち込まないで。ペアリング知識は披露より共有、料理は一緒に味わう姿勢が鍵です。相手のルーツや好みを面白がるだけで、食事はぐっと弾みます。"}},
{"id": "SC4", "title": "会話が沈黙してしまった時のリカバリー", "desc": "デート中、話題が尽きて気まずい沈黙が。焦らず立て直す場面。", "steps": [{"partner": "（少し間があき、沈黙が流れる）……", "note": "沈黙を悪者にせず、自然に立て直したい。", "choices": [{"t": "（ゆったり微笑んで）こういう静かな時間も、なんだか落ち着きますね。", "s": 2, "fb": "沈黙を失敗と捉えず肯定的に言葉にできています。焦りを見せない余裕が、相手の『間が持たない』不安まで解いてくれます。"}, {"t": "あ、えっと、何か話さなきゃですね（笑）えーと…", "s": 1, "fb": "正直で可愛げはありますが、沈黙を過度に恐れる姿勢が伝わると相手も緊張します。まず一呼吸、落ち着きを見せましょう。"}, {"t": "（スマホをちらっと見る）", "s": 0, "fb": "気まずさから逃げたくなる気持ちは分かりますが、スマホは『退屈』の合図に映ります。目の前の相手に意識を戻しましょう。"}]}, {"partner": "（少しほっとして）そうですね。えっと、何の話してましたっけ。", "choices": [{"t": "さっきの旅行の話、続き聞きたいです。一番良かった場所ってどこでした？", "s": 2, "fb": "前の話題を拾って自然に再始動できています。過去の会話を覚えている姿勢は『ちゃんと聞いていた』証で好感度が上がります。"}, {"t": "何でしたっけね（笑）まあいいや、別の話しましょう。", "s": 1, "fb": "切り替えは悪くありませんが、思い出そうとしないと関心の薄さが出ます。前の話題を軽く探る一言があると温かいです。"}, {"t": "沈黙って気まずいですよね、こういうの苦手で。", "s": 0, "fb": "共感を誘いたいのでしょうが、気まずさを言語化すると空気が固まります。話題を提供する側に回る方が場が和みます。"}]}, {"partner": "旅行!そうそう、去年〇〇に行ったんですよ。楽しかったなあ。", "choices": [{"t": "いいですね!写真とか撮りました？どんなところが印象に残ってます？", "s": 2, "fb": "相手が乗ってきた話題に前のめりで反応し、具体的な質問で膨らませています。沈黙前より会話が活気づく理想の展開です。"}, {"t": "〇〇いいですよね。僕（私）も昔行きました。", "s": 1, "fb": "共感は良いのですが自分の話に寄せると相手の熱が冷めることも。まず相手の体験を十分に聞いてから重ねましょう。"}, {"t": "へえ。旅行あんまり興味なくて、僕（私）はインドア派で。", "s": 0, "fb": "正直さは尊いですが、相手が楽しげな話題を否定すると再び沈黙を招きます。詳しくなくても『どこが良かった？』と委ねましょう。"}]}, {"partner": "写真いっぱい撮りました!見ます？この景色すごくて。", "choices": [{"t": "うわ、本当だ、きれい!ここどうやって行くんですか？私も行ってみたいな。", "s": 2, "fb": "素直な感嘆と『自分も行きたい』の共有で、相手の楽しさに乗れています。感情のリアクションが大きいほど相手は嬉しくなります。"}, {"t": "へえ、いいですね。（軽く見る）", "s": 1, "fb": "リアクションが控えめで、見せてくれた相手が少し寂しく感じます。写真は感情を共有するチャンス、一言驚きを添えましょう。"}, {"t": "あ、それ有名な観光地ですよね。混んでたでしょ？", "s": 0, "fb": "知識を示したいのでしょうが、水を差す指摘は熱を冷まします。まず景色に感嘆し、相手の体験を肯定する方が場が弾みます。"}]}, {"partner": "（すっかり打ち解けて）なんか、さっきより話しやすくなりましたね。", "choices": [{"t": "ほんとですね。〇〇さんの旅行の話、聞いてて楽しかったです。", "s": 2, "fb": "立て直せた喜びを共有し、相手の話を楽しんだと伝えています。沈黙を乗り越えた経験が二人の距離をむしろ縮めます。"}, {"t": "よかったです、さっきは焦りました（笑）", "s": 1, "fb": "素直で親しみやすいですが、焦りを蒸し返すと相手も気にします。前向きに『楽しかった』と締める方が余韻が良くなります。"}, {"t": "やっぱ沈黙は良くないですね、次から気をつけます。", "s": 0, "fb": "反省は誠実ですが、せっかく和んだ空気を再び緊張に戻してしまいます。沈黙は悪ではないと構え、今を楽しむ姿勢で十分です。"}]}], "endings": {"high": "気まずい沈黙は、いつの間にか笑い合える時間に変わりました。あなたが焦らず、相手の話題を拾い、感情豊かに反応したから。沈黙を恐れない余裕こそ、一緒にいて心地よい人の証です。", "mid": "沈黙は無事に乗り越えられました。ただ時々、自分の話や指摘に寄ってしまう場面も。次は『相手の話題を拾う』『大きめのリアクション』を意識すると、間はもっと自然に埋まります。", "low": "沈黙に少し飲まれてしまいました。でも大丈夫、間は誰にでも訪れます。鍵は、焦りを見せないこと、前の話題を拾うこと、スマホより相手を見ること。沈黙は肯定してしまえば怖くありません。"}},
{"id": "SC5", "title": "相手の趣味の話を聴く", "desc": "相手が熱中する趣味の話。自分は詳しくないが、聴いて広げる場面。", "steps": [{"partner": "実は休日、ずっとボルダリングやってるんです。ハマっちゃって。", "note": "知らない趣味でも会話を広げる練習。", "choices": [{"t": "ボルダリング!やったことないんですが、どんなところが面白いんですか？", "s": 2, "fb": "知らないことを素直に認めつつ、相手の情熱を引き出す質問で返せています。『教えて』の姿勢は相手を主役にし、話が弾みます。"}, {"t": "へえ、すごいですね。運動神経いいんですね。", "s": 1, "fb": "褒めは悪くありませんが会話が広がりにくい。『どんな時が楽しい？』と体験を尋ねると、相手はもっと語りたくなります。"}, {"t": "僕（私）運動苦手なんで、そういうの全然ダメで。", "s": 0, "fb": "自己開示のつもりでも、話を自分の苦手に引き取ると相手の熱が行き場を失います。まず相手の楽しさに関心を向けましょう。"}]}, {"partner": "最初は登れなくても、コツを掴んで完登できた時が最高なんですよ!", "choices": [{"t": "できなかったことができる瞬間って、たまらないですよね。何か通じるものある気がします。", "s": 2, "fb": "趣味そのものを知らなくても『達成感』という普遍の感情で共感できています。抽象化して橋を架ける、上級の傾聴術です。"}, {"t": "完登っていうんですね。専門用語かっこいい。", "s": 1, "fb": "用語に興味を持つのは良い入口ですが、そこ止まりだと表面的。相手が語った『最高の瞬間』の感情に触れると深まります。"}, {"t": "でも危なくないですか？怪我とかしそう。", "s": 0, "fb": "心配は優しさですが、盛り上がりに水を差す形に。まず楽しさに共感し、心配は『気をつけてね』と軽く添える程度が良いです。"}]}, {"partner": "通じるものありますか?〇〇さんは何か夢中になれること、あります？", "choices": [{"t": "僕（私）は料理で、思い通りにできた時がまさにそれです。ジャンルは違うけど、同じ感覚かも。", "s": 2, "fb": "相手の話に触発された自己開示で、共通の感覚を見つけています。聴くだけでなく自分も開く、対等な交流ができています。"}, {"t": "うーん、これといってないんですよね、無趣味で。", "s": 1, "fb": "正直ですが『無趣味』で止めると会話が痩せます。小さな好きでも一つ挙げると、相手が広げてくれる余地が生まれます。"}, {"t": "〇〇さんほど本気なものはないですよ、尊敬します。", "s": 0, "fb": "謙遜と称賛のようで、自分を下げて距離を作っています。卑下より、小さくても自分の熱を語る方が対等で魅力的です。"}]}, {"partner": "料理いいですね!私、食べる専門なので憧れます。", "choices": [{"t": "じゃあ相性ばっちりですね（笑）今度作りますよ。ボルダリングの後とかお腹すきそう。", "s": 2, "fb": "相手の趣味を覚えて会話に織り込み、次に繋がる提案も自然です。二人の話題を掛け合わせる、関係を進める好返しです。"}, {"t": "いやいや、そんな大したものじゃないですよ。", "s": 1, "fb": "謙遜も度が過ぎると相手の好意を弾いてしまいます。素直に『嬉しい』と受け取る方が、会話も気持ちも前に進みます。"}, {"t": "料理教室でも通えばすぐできますよ、〇〇さんも。", "s": 0, "fb": "アドバイスのつもりでしょうが、憧れを口にした相手に指導は上から目線に。まず憧れてくれた気持ちを喜ぶのが自然です。"}]}, {"partner": "それ嬉しいな。〇〇さんと話してると、新しいこと始めたくなります。", "choices": [{"t": "それ最高の褒め言葉です。僕（私）も〇〇さんの話でボルダリング気になってきました。", "s": 2, "fb": "好意を素直に受け取り、相手の趣味に興味が湧いたと返せています。影響し合える関係の予感が、相手を明るくします。"}, {"t": "ありがとうございます。お互い刺激になりますね。", "s": 1, "fb": "感じは良いですが少し優等生的。相手の趣味に具体的な興味を示すと、社交辞令を超えた温度が生まれます。"}, {"t": "でも僕（私）飽きっぽいので、続くか分からないですけどね。", "s": 0, "fb": "予防線を張りたい気持ちは分かりますが、前向きな空気を自分から冷ましています。今は相手の好意に素直に乗りましょう。"}]}], "endings": {"high": "知らない趣味の話が、いつしか二人の共通の楽しみに変わりました。あなたが『教えて』と相手を主役にし、感情で共感し、自分も開いたから。詳しくなくても心は繋げられる、その好例です。", "mid": "相手の話を気持ちよく聴けました。ただ時々、自己卑下や心配で流れを止めた場面も。次は『達成感などの共通感情で共感』『小さな自分の熱も語る』を意識すると、聴く力がさらに深まります。", "low": "少し受け身になってしまいました。大丈夫、知らない話題こそ伸びしろです。鍵は、苦手に引き取らず『どこが楽しい?』と尋ねること、心配より共感を先に置くこと。聴き上手は生まれつきではなく技術です。"}},
{"id": "SC6", "title": "旅行の話題で盛り上がる", "desc": "旅行好きの相手と意気投合。温泉や観光地の知識も使いながら盛り上げる。", "steps": [{"partner": "旅行が趣味で、次どこ行こうか考えるのが幸せなんです。", "note": "温泉・観光地の知識を自然に使える場面。", "choices": [{"t": "分かります、計画の時間が一番わくわくしますよね。国内派ですか、海外派ですか？", "s": 2, "fb": "共感してから好みを尋ね、話を広げる方向を相手に委ねられています。旅の楽しみの本質を押さえた温かい返しです。"}, {"t": "いいですね、お金かかりそうだけど。", "s": 1, "fb": "親しみのある本音ですが、費用の話は夢に水を差しがち。まず楽しさに共感してから、軽い雑談として触れる程度に。"}, {"t": "僕（私）あんまり旅行しないんで、家が一番落ち着きます。", "s": 0, "fb": "インドア派も素敵ですが、相手の幸せを最初に否定すると熱が冷めます。行かなくても『どこが良かった?』と聴けば繋がります。"}]}, {"partner": "どちらも好きですけど、最近は温泉巡りにハマってて。", "choices": [{"t": "温泉いいですね!僕（私）は硫黄の匂いがする濁り湯が好きで。〇〇さんはどんな泉質が好みですか？", "s": 2, "fb": "具体的な知識をさりげなく開示しつつ相手の好みを尋ねています。共通の趣味で盛り上がる、理想的な広げ方です。"}, {"t": "温泉ね、僕（私）はサウナ派なんですよ。整うって最高で。", "s": 1, "fb": "自分の好きを語るのは良いのですが、相手の話を引き取り気味。まず温泉に乗ってから自分の話に繋げると自然です。"}, {"t": "温泉ってのぼせるし、あんまり得意じゃなくて。", "s": 0, "fb": "苦手を正直に言う誠実さはありますが、相手の趣味を最初に否定すると話がしぼみます。良さを尋ねる余地を残しましょう。"}]}, {"partner": "濁り湯いいですよね!この前行った〇〇温泉、最高でした。", "choices": [{"t": "〇〇温泉いいなあ、行ってみたい。泊まりでした？夜と朝で湯の感じ変わりますよね。", "s": 2, "fb": "相手の体験に前のめりで反応し、温泉通ならではの一言で共感を深めています。知識が自慢でなく共有として機能しています。"}, {"t": "へえ、有名なとこですね。", "s": 1, "fb": "知ってはいても反応が淡白で、楽しげな相手が少し寂しく感じます。行きたい気持ちや質問を添えると盛り上がります。"}, {"t": "僕（私）はもっといい温泉知ってますよ。教えましょうか。", "s": 0, "fb": "情報提供のつもりでも、相手の思い出を上書きする形に。まず相手の体験を称え、自分のおすすめは後で楽しく共有しましょう。"}]}, {"partner": "泊まりでした!朝風呂が本当に気持ちよくて。〇〇さんも温泉旅行行きます？", "choices": [{"t": "行きます!朝風呂のあとの朝ごはんまでが幸せなんですよね。今度おすすめ交換しましょう。", "s": 2, "fb": "体験の細部まで共感し、『おすすめ交換』で次に繋げています。共通の楽しみを未来の約束に変える、関係を進める好返しです。"}, {"t": "行きたいんですけど、なかなか休みが取れなくて。", "s": 1, "fb": "現実的ですが後ろ向きに響きます。『行きたい!』を前に出し、いつか一緒にの余白を残す方が空気が明るくなります。"}, {"t": "一人だと味気ないんで、あんまり行かないですね。", "s": 0, "fb": "寂しさの本音でしょうが、暗いトーンは場を冷やします。『誰かと行けたら楽しそう』と前向きに変換すると好印象です。"}]}, {"partner": "おすすめ交換いいですね!なんだか一緒に行きたくなっちゃう（笑）", "choices": [{"t": "それ、僕（私）も思ってました（笑）いつか二人でのんびり温泉、実現したら最高ですね。", "s": 2, "fb": "相手の踏み込みを受け止め、同じ未来を共有できています。押しつけず『いつか』の余白を残す形が、自然で誠実です。"}, {"t": "ははは、そうですね、いつか行けたらいいですね。", "s": 1, "fb": "感じは良いですが少し社交辞令的。相手が勇気を出した一言に、こちらも一歩気持ちを乗せると距離が縮まります。"}, {"t": "え、まだ二回目なのに気が早いですよ（笑）", "s": 0, "fb": "照れ隠しでしょうが、相手の好意を茶化すと傷つけます。冗談でも一度受け止めてから返す方が、相手は安心して踏み込めます。"}]}], "endings": {"high": "温泉談義はいつしか『いつか一緒に』という約束に。あなたが知識を共有として使い、相手の体験を称え、未来を一緒に描いたから。共通の趣味は、二人を近づける最高の追い風になりました。", "mid": "旅行の話で楽しく盛り上がれました。ただ時々、自分の話に引き取ったり後ろ向きになった場面も。次は『相手の体験を先に称える』『いつかを前向きに描く』を意識すると、共感がもっと深まります。", "low": "盛り上がりにやや乗り切れませんでした。でも大丈夫。相手の趣味を否定せず、知識は自慢でなく共有に、そして誘いは前向きに。共通の話題は宝の山、次はきっと一緒に笑えます。"}},
{"id": "SC7", "title": "2回目のデートに誘う", "desc": "楽しかった時間の締めくくり。次に繋げ、日程を調整する場面。", "steps": [{"partner": "今日はあっという間でしたね。すごく楽しかったです。", "note": "好意を確認し、自然に次へ誘いたい。", "choices": [{"t": "僕（私）も本当に楽しくて。よかったら、また会ってもらえたら嬉しいんですが。", "s": 2, "fb": "自分の気持ちを正直に伝え、相手に選ぶ余地を残して誘えています。押しつけがましさのない、誠実で好感度の高い誘い方です。"}, {"t": "ですよね!じゃあ次いつにします？", "s": 1, "fb": "前向きで悪くありませんが、少し急ぎ足。まず『また会いたい』と気持ちを言葉にしてから日程に入ると温かいです。"}, {"t": "楽しかったなら、脈ありってことでいいですか？", "s": 0, "fb": "確認したい気持ちは分かりますが、直接的な駆け引きは相手を身構えさせます。気持ちは言葉で誠実に伝える方が響きます。"}]}, {"partner": "はい、ぜひ!また会いたいです。", "choices": [{"t": "嬉しいです。〇〇さん美術館好きって言ってましたよね、今度一緒に行きませんか？", "s": 2, "fb": "相手の話を覚えていて、興味に合わせた具体的な提案ができています。『覚えていてくれた』喜びが、誘いの成功率を高めます。"}, {"t": "よかった!じゃあまた連絡しますね。", "s": 1, "fb": "感じは良いですが具体性がなく、次が宙に浮きがち。相手の好きに絡めた案を一つ出すと、次の約束が現実になります。"}, {"t": "じゃあどこでもいいので、〇〇さんが決めてください。", "s": 0, "fb": "相手を立てるつもりでも、丸投げは無関心に映ります。まず自分から案を出し、相手の希望も聞く方が思いやりが伝わります。"}]}, {"partner": "美術館いいですね!行きたいと思ってた展示があるんです。", "choices": [{"t": "じゃあそれ行きましょう!〇〇さんの都合のいい日、いくつか教えてもらえますか？", "s": 2, "fb": "相手の希望を採用し、日程は相手の都合を優先して尋ねています。相手主体で調整する姿勢が、思いやりとして伝わります。"}, {"t": "僕（私）は基本いつでも空いてるので、合わせますよ。", "s": 1, "fb": "柔軟さは長所ですが『いつでも暇』は少し軽く映ることも。候補を出し合う形にすると、対等で前向きに進みます。"}, {"t": "その展示、僕（私）もう見ちゃったんですよね。別のにしません？", "s": 0, "fb": "正直ですが、相手が行きたいと言った直後の却下は残念。『もう一度でも楽しめそう』と歩み寄る余地を残しましょう。"}]}, {"partner": "来週末か、再来週の土曜なら空いてます。", "choices": [{"t": "じゃあ来週末はどうですか？展示の前に、この前話したカフェでランチもいいですね。", "s": 2, "fb": "素早く決めつつ、前の会話を活かした提案を重ねています。決断力と気配りの両立で、相手はスムーズに安心して乗れます。"}, {"t": "えーと、どっちがいいかな…また考えて連絡します。", "s": 1, "fb": "慎重さは分かりますが、決めきれないと熱が冷めます。相手が候補をくれた今、その場で一つに絞る方が誠実で頼もしいです。"}, {"t": "どちらでも大丈夫なので、〇〇さんの気分で。", "s": 0, "fb": "譲るのは優しさですが、二度目の丸投げは決断を全て相手任せに。ここは自分から選び、相手の負担を減らしましょう。"}]}, {"partner": "来週末!楽しみです。予定できて嬉しいな。", "choices": [{"t": "僕（私）も今から楽しみです。当日の詳細は前日にまた連絡しますね。", "s": 2, "fb": "気持ちを共有し、次の連絡まで示して安心感を与えています。段取りの一言が、相手に『丁寧な人』という信頼を残します。"}, {"t": "はい、じゃあ来週。楽しみにしててください。", "s": 1, "fb": "良い締めですが、少しそっけない印象も。楽しみな気持ちを一言添えると、別れ際の余韻がぐっと温かくなります。"}, {"t": "ドタキャンだけはしないでくださいね（笑）", "s": 0, "fb": "冗談でしょうが、約束の直後に不信を匂わせると相手は少し身構えます。ここは素直に楽しみだと伝える方が絆が深まります。"}]}], "endings": {"high": "次の約束は、相手の『行きたい』を叶える形で自然に決まりました。あなたが気持ちを言葉にし、相手の話を覚え、段取りまで気を配ったから。誠実な誘いは、二度目への期待を最高の形で膨らませます。", "mid": "次のデートは無事に決まりました。ただ丸投げや決めきれない場面も少し。次は『自分から案を出す』『その場で日程を絞る』を意識すると、頼もしさと安心感がぐっと増します。", "low": "誘いはやや不安定になりました。大丈夫、誘い方には型があります。気持ちを言葉にし、相手の興味に合った案を自分から出し、日程は相手の都合を優先する。駆け引きより誠実さが、次に繋がります。"}},
{"id": "SC8", "title": "デート後のお礼LINEと関係の進め方", "desc": "デートを終えた夜。お礼のメッセージを送り、関係を前へ進める場面。", "steps": [{"partner": "（あなたがまず、デート後のお礼を送るところ）", "note": "当日中に送る一通目。温度と誠実さが鍵。", "choices": [{"t": "今日はありがとうございました!美術館もランチもすごく楽しかったです。無事に帰れましたか？", "s": 2, "fb": "感謝と具体的な楽しさを伝え、相手を気遣う一言で締めています。当日中の丁寧なお礼は、誠実さが最も伝わる王道です。"}, {"t": "今日はありがとうございました。また機会があれば。", "s": 1, "fb": "礼儀正しいですが『機会があれば』が他人行儀で距離を感じさせます。楽しかった具体や気遣いを添えると温度が上がります。"}, {"t": "（数日置いてから）この前はどうも。楽しかったです。", "s": 0, "fb": "余裕を演出したいのかもしれませんが、間が空くと熱が冷めたと受け取られがち。気持ちは鮮度が命、当日中が誠実です。"}]}, {"partner": "こちらこそありがとうございました!無事帰れました。私もすごく楽しかったです。", "choices": [{"t": "よかったです。〇〇さんと話してると時間があっという間で。次の展示も今から楽しみです。", "s": 2, "fb": "楽しさを具体的に伝え、次への期待も自然に示せています。相手は『また会いたい』を再確認でき、関係が前へ進みます。"}, {"t": "それはよかったです。おやすみなさい。", "s": 1, "fb": "感じは良いですが早めに切り上げる形。もう少し余韻を楽しむ一言があると、相手も名残惜しさを共有できます。"}, {"t": "じゃあ付き合うってことで、これからよろしくね!", "s": 0, "fb": "気持ちが逸るのは分かりますが、二度のデートで関係を一足飛びに定義すると相手が引くことも。段階を大切にしましょう。"}]}, {"partner": "次も楽しみです!〇〇さんって、なんだか一緒にいて落ち着くんですよね。", "choices": [{"t": "それ、僕（私）も同じこと感じてました。自然体でいられるのが嬉しいです。", "s": 2, "fb": "相手の好意に同じ気持ちを返し、関係を一歩深めています。素直な相互開示は、信頼と親密さを育てる最良の栄養です。"}, {"t": "ありがとうございます、照れますね。", "s": 1, "fb": "可愛げはありますが受け取るだけで終わっています。相手が開いてくれた分、こちらも気持ちを返すと絆が深まります。"}, {"t": "よく言われるんですよ、そういうの。", "s": 0, "fb": "照れ隠しでしょうが、せっかくの好意を軽く流す形に。相手の言葉を大切に受け止め、自分の気持ちで応える方が響きます。"}]}, {"partner": "また来週会えるの、待ち遠しいです。", "choices": [{"t": "僕（私）もです。それまでの間も、よかったら日々のこと少しずつ話せたら嬉しいな。", "s": 2, "fb": "次の約束の間も繋がりたいと、押しつけず提案できています。会う日以外のやり取りが、関係をゆっくり温めていきます。"}, {"t": "僕（私)も待ち遠しいです!早く来週にならないかな。", "s": 1, "fb": "素直で微笑ましいですが、気持ちの共有だけで止まっています。次に繋がる小さな提案を添えると、関係がさらに動きます。"}, {"t": "あんまり期待させると、実際会ってがっかりされそうで怖いです。", "s": 0, "fb": "謙虚さの裏返しでしょうが、後ろ向きな不安は相手まで不安にします。高まった気持ちには、素直に前向きで応えましょう。"}]}, {"partner": "それ嬉しい!毎日ちょっとずつでも話せたら、もっと〇〇さんのこと知れますね。", "choices": [{"t": "ぜひ。焦らず、お互いのペースで少しずつ仲良くなれたら嬉しいです。おやすみなさい。", "s": 2, "fb": "相手の気持ちを受け止めつつ、無理のないペースを大切にする成熟した姿勢を示せています。誠実さが長続きする関係を作ります。"}, {"t": "はい!じゃあ毎日連絡しますね。おやすみなさい。", "s": 1, "fb": "前向きで良いのですが『毎日必ず』と約束すると後で負担にも。『少しずつ』と余白を残す方が、お互い自然体でいられます。"}, {"t": "どんどんアプローチするんで、覚悟しててください（笑）", "s": 0, "fb": "勢いは可愛げでもありますが、相手のペースを無視した宣言は圧に感じられることも。歩調を合わせる方が信頼が深まります。"}]}], "endings": {"high": "お礼のLINEは、二人の距離をさらに縮める温かいやり取りになりました。あなたが感謝を具体的に伝え、好意に素直に応え、相手のペースを尊重したから。誠実で焦らない姿勢が、実る関係の土台を築きます。", "mid": "お礼と次への流れは good でした。ただ好意を流したり、逆に先走った場面も。次は『相手の気持ちに同じ熱で返す』『段階を大切にする』を意識すると、信頼がもっと積み上がります。", "low": "やり取りが少しちぐはぐになりました。でも大丈夫。お礼は当日中に具体的に、好意には素直に応え、関係は焦らず段階を踏む。この三つを守れば、誠実さは必ず相手に届きます。"}}

{"id": "T01", "cat": "きく", "name": "あいづちの三段活用", "summary": "相づちに変化をつけて聞き上手に", "how": "「うん」だけを繰り返すと機械的に聞こえます。共感の「そうなんですね」、驚きの「えっ、すごい」、促しの「それでどうなったんですか？」を場面で使い分けます。声のトーンも合わせると、ちゃんと聞いている感じが自然に伝わります。", "example": "相手:「先週、初めて一人で登山してきたんです」\nあなた:「えっ、一人で!すごいですね」\n相手:「頂上でお弁当食べて」\nあなた:「いいなあ、それでどうでした？」", "caution": "大げさに反応しすぎると芝居がかって不自然です。相手の話の熱量に合わせ、驚くべき所だけ強めるのがコツです。"},

{"id": "T03", "cat": "きく", "name": "ひとことサマリー", "summary": "話をまとめて理解を伝える", "how": "相手が長めに話し終えたら「つまり〇〇だったんですね」と要点を短くまとめて返します。話を聞いて理解した証になり、相手は深く安心します。否定や訂正を混ぜず、相手の言葉に寄り添ってなぞるのがコツです。", "example": "相手:「転職して環境も変わって、最初は不安で…でも今は楽しくて」\nあなた:「大きな決断をして、今それが実を結んでるんですね」\n相手:「そう、まさにそんな感じです」", "caution": "まとめを急ぎすぎて話を切り上げる道具にしないこと。相手が話し終えてから、ゆっくり受け止めるように使います。"},
{"id": "T04", "cat": "きく", "name": "うなずき+ボディランゲージ", "summary": "体で聞いている姿勢を示す", "how": "言葉だけでなく、体を相手に向け、適度に目を合わせ、話の区切りでうなずきます。腕を組まず、少し前のめりになると関心が伝わります。スマホは見えない場所に。非言語のサインは言葉以上に安心感を与えます。", "example": "相手:「実はこの前、失敗しちゃって」\nあなた:(体を向けてうなずきながら)「うんうん」\n相手:「でも学ぶことも多くて」\nあなた:(目を見て)「なるほど、前向きですね」", "caution": "見つめすぎると圧になります。ずっと凝視せず、時々視線を外してやわらかい表情を保つのが自然です。"},
{"id": "T05", "cat": "ひろげる", "name": "5W1Hの横広げ", "summary": "開いた質問で自由に話してもらう", "how": "「はい/いいえ」で終わらないよう、いつ・どこで・誰と・何を・なぜ・どうやって、で尋ねます。「どんな風に？」「きっかけは？」と聞くと、相手が自分の言葉で話せて会話が転がります。序盤は答えやすい話題から始めます。", "example": "相手:「カメラが趣味なんです」\nあなた:「いいですね!どんな被写体を撮ることが多いんですか？」\n相手:「最近は街のスナップを」\nあなた:「街撮り、始めたきっかけって何だったんですか？」", "caution": "重い『なぜ』を連発すると詰問になります。『どんな』『どうやって』を中心に、軽やかに聞くと安全です。"},
{"id": "T06", "cat": "ひろげる", "name": "連想ジャンプ", "summary": "一つの話題から関連話題へつなぐ", "how": "話が一段落したら、今の話題と関連する別の話題へ橋を架けます。「旅行好き」なら「写真も撮りますか？」のように連想でつなぐと、途切れず自然に広がります。深掘りに行き詰まったときの逃げ道にもなります。", "example": "相手:「旅行が好きで、去年は台湾に」\nあなた:「台湾いいですね!食べ歩きとかしました？」\n相手:「屋台巡りしました」\nあなた:「屋台!普段もお店開拓とか好きなタイプですか？」", "caution": "連想を飛ばしすぎると話が散らかります。今の話題と一本の糸でつながる範囲で、自然に橋を架けるのがコツです。"},

{"id": "T08", "cat": "ひろげる", "name": "共通点さがし", "summary": "似ている点を見つけて距離を縮める", "how": "人は自分と似た相手に親しみを覚えます(類似性の法則)。出身・食の好み・休日の過ごし方などから共通点を探し、見つかったら「私もです!」と喜びを共有します。本当の共通点だけを扱うのが誠実さの前提です。", "example": "相手:「休みの日は家でのんびり派で」\nあなた:「わかります、私もインドア派です!おすすめの過ごし方あります？」\n相手:「映画をよく観ます」\nあなた:「映画いいですね、私もよく観ます」", "caution": "好かれたい一心で嘘の共通点を作ると後で苦しくなります。共通点がなければ違いを面白がる方向でも大丈夫です。"},

{"id": "T11", "cat": "つたえる", "name": "会話に乗せて誘う", "summary": "盛り上がりの流れでデートに誘う", "how": "共通の話題で盛り上がった瞬間を捉え、その流れに乗せて誘うと自然で断られにくくなります。「その話、もっと聞きたいので今度お茶しませんか？」のように、会話の内容と誘いをつなげるのがコツです。日時は二択で提案すると答えやすくなります。", "example": "相手:「あの美術館、実はまだ行けてなくて」\nあなた:「私もです!よかったら一緒に行きませんか？」\n相手:「いいですね、行きたいです」\nあなた:「来週末か再来週、どちらが都合いいですか？」", "caution": "断られる不安から遠回しすぎると伝わりません。誘いははっきり、でも相手が断りやすい余白も残すのが誠実です。"},
{"id": "T12", "cat": "つたえる", "name": "その日のお礼", "summary": "当日中に具体的な感想を伝える", "how": "デートや会話の後は、その日のうちに具体的な感想を添えてお礼を送ります。「今日の〇〇、美味しかったです」と一点具体を入れると、楽しかった気持ちが伝わります。定型のお礼だけより温度が伝わり、次につながりやすくなります。", "example": "あなた:「今日はありがとうございました。教えてもらったお店、すごく美味しかったです」\n相手:「こちらこそ楽しかったです」\nあなた:「話に出た本、さっそく探してみますね。また色々聞かせてください」", "caution": "お礼のついでに次の約束を一方的に決めないこと。感謝と余韻を伝えるに留め、次の話は相手の反応を見てからにします。"},
{"id": "T13", "cat": "ピンチ対応", "name": "沈黙の実況中継", "summary": "目の前の物を話のきっかけにする", "how": "沈黙が訪れたら、焦らず目の前にある物や状況を素直に口にします。「この照明おしゃれですね」「この料理きれい」など五感で感じたことがそのまま話題になります。沈黙は悪ではなく、少しの間は自然なものと構えるのが大切です。", "example": "(会話が途切れる)\nあなた:「このお店、なんだか落ち着く雰囲気ですね」\n相手:「本当だ、隠れ家っぽくていいですね」\nあなた:「こういう静かな店、好きなんですか？」", "caution": "沈黙を埋めようと質問を連発すると相手が疲れます。一つ話題を出したら、また間を許すくらいの余裕を持ちましょう。"},
{"id": "T14", "cat": "ピンチ対応", "name": "話題ストックの引き出し", "summary": "事前に定番テーマを用意しておく", "how": "話題が尽きて焦らないよう、食べ物・休日・旅行・最近ハマっていること・出身地など、誰とでも話せる定番テーマをいくつか頭に入れておきます。一つ尽きたら次の引き出しを開ける感覚で、自然に切り替えられます。", "example": "(旅行の話が一段落)\nあなた:「そういえば、休みの日ってどんな風に過ごすことが多いんですか？」\n相手:「最近はカフェ巡りにハマってて」\nあなた:「いいですね!おすすめのお店あります？」", "caution": "用意した質問を機械的に消化すると面接のようになります。相手の答えに反応しながら、自然な流れで出すのがコツです。"},
{"id": "T15", "cat": "ピンチ対応", "name": "素直な失言リカバリー", "summary": "すぐ認めて言い直す", "how": "うっかり失礼なことを言ってしまったら、ごまかさず「すみません、言い方が悪かったです」と素直に認めて言い直します。誰でも失言はするもので、誠実な訂正はかえって人柄の良さを伝えます。取り繕うより正直さが信頼を守ります。", "example": "あなた:「え、そんな仕事もあるんですね…あ、変な意味じゃなくて」\n相手:「(苦笑)」\nあなた:「ごめんなさい、今の失礼でしたね。純粋に珍しくて興味が湧いたんです」\n相手:「大丈夫ですよ」", "caution": "冗談だったと押し通したり相手のせいにするのは逆効果です。言い訳を重ねず、短く謝って前向きに言い直しましょう。"},
{"id": "T16", "cat": "ピンチ対応", "name": "話を相手に渡す", "summary": "自分が話しすぎたら質問で返す", "how": "気づくと自分ばかり話していたときは、区切りで「あなたはどうですか？」と話を相手に渡します。会話はキャッチボールで、投げっぱなしにしないのがコツ。自慢話に傾きそうなときも、一言で抑えて相手に問いを向けると好印象です。", "example": "あなた:「…と、つい自分の話ばかりしちゃいました」\n相手:「いえいえ」\nあなた:「〇〇さんはお休みの日、どんなことされてるんですか？」\n相手:「私は最近ヨガを始めて」", "caution": "渡し方が唐突だと話を切ったように感じられます。自分の話を軽く締めてから、自然に相手へ問いを向けましょう。"},
{"id": "T17", "cat": "オンライン", "name": "読ませるプロフィール", "summary": "人柄と会話の糸口を具体的に書く", "how": "プロフィールは条件の羅列でなく、人柄と趣味を具体的に書くと相手が話しかけやすくなります。「カフェ巡りが好きで、月に数回新しい店を開拓します」のように固有の情報を入れると、そこが会話の糸口になります。写真は自然な笑顔を選びます。", "example": "プロフィール例:「休日はカフェ巡りと読書が好きです。最近は和菓子屋さん巡りにハマってます。美味しいお店を教え合える方だと嬉しいです」", "caution": "盛りすぎや自慢は逆効果で、会って落差があると信頼を損ないます。等身大で、相手が絡みやすい一点を残すのがコツです。"},
{"id": "T18", "cat": "オンライン", "name": "読んだ証の初回メッセージ", "summary": "相手の情報に触れて質問形で送る", "how": "最初のメッセージは、相手のプロフィールを一点具体的に拾って質問形にします。「カフェ巡りお好きなんですね、おすすめありますか？」のように読んだ証拠を入れると、誠実さが伝わり返信率が上がります。定型文のコピペは埋もれます。", "example": "あなた:「はじめまして。プロフィールのカフェ巡り、私も好きです!最近行った中でおすすめのお店ってありますか？」\n相手:「〇〇ってお店が良かったです」\nあなた:「そこ気になってました、行ってみます!」", "caution": "いきなり連絡先を聞いたり褒めすぎたりは警戒されます。まずは軽い質問一つで、返しやすいボールを投げましょう。"},
{"id": "T19", "cat": "オンライン", "name": "ペースを合わせるLINE", "summary": "相手の文量と頻度に寄せる", "how": "メッセージは相手の返信ペースや文量に合わせると心地よく続きます。相手が短めなら自分も短く、返信が翌日なら急かさず待ちます。長文の連投や即レス要求は負担になります。相手が受け取りやすい球を返す意識が長続きの秘訣です。", "example": "相手:「今日は疲れたー」\nあなた:「おつかれさま!ゆっくり休んでね」\n相手:「ありがとう、そっちは？」\nあなた:「こっちも一段落したとこ。明日も無理しすぎずいこうね」", "caution": "駆け引きでわざと返信を遅らせるのは不誠実で相手を不安にします。単純に相手のリズムに寄り添うだけで十分です。"},
{"id": "T20", "cat": "オンライン", "name": "会う約束への橋渡し", "summary": "メッセージから対面へ自然につなぐ", "how": "やり取りが弾んできたら、話題を口実に会う提案へつなげます。「その話、直接聞きたいです」と会話の流れに乗せると自然です。オンラインだけ長引くと熱が冷めやすいので、盛り上がった頃に軽く提案するのがコツです。場所は相手が安心できる所を。", "example": "相手:「そのお店、私も気になってました」\nあなた:「じゃあ、よかったら今度一緒に行きませんか？お茶がてらでも」\n相手:「いいですね、ぜひ」\nあなた:「では日程、来週あたりで合わせましょう」", "caution": "急かしすぎたり相手の都合を無視した提案は引かれます。相手が乗り気か様子を見て、無理なら焦らず待つ余裕を持ちます。"}

const NETA={"situations":[{"scene": "初対面の最初の10分", "topics": [{"topic": "今日ここまで来た道のり", "opener": "今日、迷わず来られましたか？ このお店ちょっと分かりにくいですよね。", "follow": "普段の移動手段や方向感覚の話に広げられます。「よく道に迷うほう？」と軽く聞くと、お互いの性格がやわらかく見えてきます。"}, {"topic": "お店選びの理由", "opener": "ここ、雰囲気が落ち着いていていいですね。よく来られるんですか？", "follow": "相手のお気に入りの場所やこだわりを聞けます。「どんな空間だと落ち着きます？」と続けると好みが自然に見えてきます。"}, {"topic": "休日の過ごし方", "opener": "お休みの日って、外に出る派ですか、おうちでゆっくり派ですか？", "follow": "二択で聞くと答えやすいです。答えを受けて「私はどちらかというと…」と自分も開示すると会話が往復します。"}, {"topic": "最近のちょっといいこと", "opener": "最近、ちょっといいことってありました？ 小さなことで全然いいんですけど。", "follow": "ハードルを下げた質問で相手が話しやすくなります。相手の答えに「それいいですね」と共感し、理由を一つ掘ると盛り上がります。"}, {"topic": "呼び方の確認", "opener": "そういえば、なんてお呼びしたらいいですか？", "follow": "序盤で呼び方を決めると距離が縮まります。「じゃあ○○さんで」と復唱し、以降は名前を会話に混ぜると親しみが出ます。"}, {"topic": "緊張のシェア", "opener": "正直、こういう場ってちょっと緊張しますよね。", "follow": "自分の緊張を素直に出すと相手も安心します。「でも会えてよかったです」と前向きに締めると空気がやわらぎます。"}]}, {"scene": "カフェ・お茶デート", "topics": [{"topic": "飲み物の好み", "opener": "コーヒー派ですか、それとも紅茶とか他の派ですか？", "follow": "定番だけど広げやすい話題です。「甘いの足す派？ブラック派？」と続けると好みや生活習慣がのぞけます。"}, {"topic": "カフェの過ごし方", "opener": "一人でカフェに入って、のんびりする時間ってあります？", "follow": "読書・作業・ぼんやりなど過ごし方から価値観が見えます。「私はつい長居しちゃって」と自己開示を添えると自然です。"}, {"topic": "甘いもの談義", "opener": "甘いものって、しょっちゅう食べたくなるほうですか？", "follow": "好きなスイーツやご褒美の話に展開できます。「今度おいしいお店あったら教えてください」と次につなぐ一言も◎。"}, {"topic": "最近ハマっているもの", "opener": "最近、ちょっとハマってることってあります？ 何でもいいんですけど。", "follow": "趣味の入り口として万能です。相手の熱量に合わせて「どこが面白いんですか？」と一段深掘りすると会話が続きます。"}, {"topic": "朝型か夜型か", "opener": "朝はスッと起きられるタイプですか？ 私、けっこう苦手で。", "follow": "生活リズムから人柄が見えます。弱みを先に出すと相手も本音を返しやすく、笑いも生まれやすい話題です。"}, {"topic": "お店の内装トーク", "opener": "この椅子、座り心地いいですね。こういう落ち着く空間、好きなんですよ。", "follow": "目の前のものを話題にすると自然です。「どんなお部屋に住んでるんですか」と生活の話にゆるやかにつなげられます。"}]}, {"scene": "食事デート", "topics": [{"topic": "食の好み", "opener": "苦手な食べ物とかってあります？ 先に聞いておきたくて。", "follow": "気遣いが伝わる質問です。次の店選びにも役立ちます。「逆に大好物は？」とポジティブ方向にも広げましょう。"}, {"topic": "思い出の味", "opener": "実家でよく出てきた料理とか、思い出の味ってあります？", "follow": "家庭やルーツの話にやわらかく触れられます。「いいですね、あったかい」と共感し、自分の思い出も一つ返すと温度が上がります。"}, {"topic": "外食かおうちごはんか", "opener": "普段は外で食べる派ですか、それとも自炊派ですか？", "follow": "生活スタイルが見えます。料理する人には「得意料理は？」、しない人には「よく行くお店は？」と分岐できます。"}, {"topic": "旅先のグルメ", "opener": "旅行先で食べたもので、忘れられない一品ってあります？", "follow": "食×旅で話が広がります。「私も行ってみたいです」と共有意欲を見せると、次のデートの布石にもなります。"}, {"topic": "取り分けの気遣い", "opener": "これ、シェアします？ 取り分けちゃっていいですか？", "follow": "さりげない気配りで印象が上がります。押し付けず「食べたいのあったら遠慮なく」と相手のペースを尊重しましょう。"}, {"topic": "お酒との付き合い方", "opener": "お酒は飲まれるほうですか？ 無理のない範囲で全然大丈夫です。", "follow": "飲む・飲まないどちらも尊重する姿勢が大切です。「私はこのくらいで」とペースを共有すると安心してもらえます。"}]}, {"scene": "歩きながら・移動中", "topics": [{"topic": "街並みの発見", "opener": "あのお店、気になりません？ こういう路地に入るの好きなんですよ。", "follow": "目に入るものを実況すると沈黙が埋まります。「今度あそこ入ってみたいですね」と一緒の未来を軽く描くのも効果的です。"}, {"topic": "歩くスピードの気遣い", "opener": "歩くの速くないですか？ 合わせるので遠慮なく言ってくださいね。", "follow": "相手のペースを気にかける姿勢が伝わります。並んで歩く距離感も、相手の反応を見ながら心地よく調整しましょう。"}, {"topic": "地元・土地勘の話", "opener": "この辺って詳しいですか？ 私はまだ来たばかりで新鮮で。", "follow": "土地勘からお気に入りスポットの話に広がります。「おすすめの場所あったら案内してほしいです」と次につなげられます。"}, {"topic": "季節の空気", "opener": "今日、風が気持ちいいですね。この季節、けっこう好きなんです。", "follow": "天気や気候は誰とでも共有できる安全な話題です。「どの季節が一番好きですか？」と価値観トークにつなげましょう。"}, {"topic": "写真を撮る習慣", "opener": "きれいですね、これ。写真とか撮るほうですか？", "follow": "撮る人には何を撮るか、撮らない人には記憶に残す派かを聞けます。景色を一緒に眺める共有体験そのものが距離を縮めます。"}, {"topic": "次に行きたい場所", "opener": "この先、ちょっと寄り道してもいいですか？ 気になる場所があって。", "follow": "受け身にならず提案できると頼もしさが出ます。相手の乗り気度を見て、無理そうなら引く柔軟さもセットで。"}]}, {"scene": "LINE・メッセージ", "topics": [{"topic": "帰宅後のお礼", "opener": "今日はありがとうございました！ 楽しくて時間があっという間でした。", "follow": "その日のうちに送ると誠実さが伝わります。具体的に「○○の話、面白かったです」と一つ挙げると心がこもります。"}, {"topic": "会話の続き", "opener": "そういえば、さっき話してた○○、あれから気になって調べちゃいました。", "follow": "デート中の話題を持ち越すと自然に続きます。相手が話したことを覚えている姿勢そのものが好印象につながります。"}, {"topic": "相手を気づかう一言", "opener": "今週お忙しそうでしたけど、ちゃんと休めてますか？", "follow": "用件だけでなく相手の体調を気にかけると温かさが伝わります。返信を急かさず、軽い一言にとどめるのがコツです。"}, {"topic": "写真・情報のシェア", "opener": "この前話してたお店、見つけたので送りますね。", "follow": "会話から生まれた具体的な行動は好感度が高いです。「よかったら今度」と誘いにつなげる自然な口実にもなります。"}, {"topic": "スタンプ・軽いやりとり", "opener": "おはようございます。今日も一日、無理しすぎずいきましょうね。", "follow": "重すぎない朝の一言は距離を縮めます。相手の返信テンポに合わせ、長文の連投は控えると心地よい関係が保てます。"}, {"topic": "次の約束の切り出し", "opener": "もしよかったら、来週あたりまたお会いできたら嬉しいです。", "follow": "遠慮しすぎず、でも押し付けない誘い方が理想です。日程は「候補いくつか出しますね」と相手に選ばせると親切です。"}]}, {"scene": "2回目以降のデート", "topics": [{"topic": "前回の振り返り", "opener": "この前話してた○○、その後どうなりました？", "follow": "前回の会話を覚えていると一気に距離が縮まります。相手の近況を主役にして、聞き役に回る余裕を見せましょう。"}, {"topic": "少し深い価値観", "opener": "仕事でもプライベートでも、これは大事にしたいなって思うことってあります？", "follow": "関係が進んだからこそ聞ける話題です。答えを評価せず「なるほど、素敵ですね」と受け止める姿勢が信頼を育てます。"}, {"topic": "休日の理想", "opener": "理想の一日って、どんなふうに過ごせたら最高ですか？", "follow": "将来の暮らし方がやわらかく見えます。「それ、一緒にやってみたいです」と共有意欲を見せると関係が前に進みます。"}, {"topic": "お互いの共通点", "opener": "私たち、意外と○○が似てますよね。話してて楽だなって思うんです。", "follow": "共通点を言葉にすると安心感が生まれます。相手だけを持ち上げず「お互い」の視点で語ると対等な空気になります。"}, {"topic": "ちょっと先の計画", "opener": "季節が変わったら、○○とか行ってみたいですね。", "follow": "軽い未来の話は関係を前向きにします。具体的すぎず「いつか」の温度で出すと、相手も気負わず乗ってくれます。"}, {"topic": "感謝を伝える", "opener": "○○さんといると、自然体でいられる気がします。ありがとうございます。", "follow": "気持ちを素直に言葉にすると信頼が深まります。照れずに、でもさらっと伝えるのが心地よさのポイントです。"}]}],
"seasons":[{"month": 1, "label": "1月", "kigo": "初詣・寒の入り・お正月", "topics": [{"topic": "今年の抱負", "opener": "今年、なにか始めたいこととかあります？ 私はゆるく一個決めてて。", "follow": "堅くなりすぎないよう自分の抱負を軽く先に出しましょう。「応援しますね」と相手の目標を後押しする姿勢が好印象です。"}, {"topic": "初詣のご利益", "opener": "初詣って行かれました？ どんなお願いしたか、ちょっと気になります。", "follow": "お願い事は人柄が出る話題です。深追いせず「叶うといいですね」と明るく受け止め、自分の参拝エピソードも添えて。"}, {"topic": "お正月の過ごし方", "opener": "お正月って、のんびり派ですか？ おせちとか食べました？", "follow": "家庭の風景がやわらかく見えます。好きなおせちの具材トークなど、軽い食の話に広げると盛り上がります。"}]}, {"month": 2, "label": "2月", "kigo": "節分・立春・バレンタイン", "topics": [{"topic": "寒さの乗り切り方", "opener": "この寒さ、どうやって乗り切ってます？ 私は鍋ばっかりで。", "follow": "防寒や温かい食べ物の話は共感を生みます。「おすすめの温まる方法あります？」と相手の知恵を聞くのも◎。"}, {"topic": "節分の思い出", "opener": "節分って豆まきしました？ 恵方巻き、静かに食べるの意外と難しいですよね。", "follow": "季節行事は笑いに変えやすい話題です。「今年の方角どっちでした？」など軽いやりとりで空気がほぐれます。"}, {"topic": "甘いものシーズン", "opener": "この時期チョコがおいしそうなの多くて、つい目が行っちゃいます。", "follow": "バレンタインを直接の駆け引きにせず、季節の楽しみとして話題化。「好きなチョコあります？」と好みトークへ。"}]}, {"month": 3, "label": "3月", "kigo": "ひな祭り・卒業・啓蟄・春分", "topics": [{"topic": "春の気配", "opener": "だんだん日が長くなってきましたね。春が近づくとちょっとうれしくなります。", "follow": "季節の移ろいへの感度は共感を呼びます。「春になったら行きたいところあります？」と前向きな計画トークへ。"}, {"topic": "新生活シーズン", "opener": "この時期って、なんだか新しいこと始めたくなりませんか？", "follow": "変化や挑戦の話にやわらかく触れられます。相手のペースを尊重し、無理に踏み込まず気持ちを共有しましょう。"}, {"topic": "旬の味覚", "opener": "菜の花とか、春の苦みのある野菜って好きですか？ 私は最近ハマってて。", "follow": "旬の食材は季節感のある話題です。「春はこれが好き」という好みの共有が、次の食事デートの布石になります。"}]}, {"month": 4, "label": "4月", "kigo": "お花見・入学・清明", "topics": [{"topic": "お花見の楽しみ方", "opener": "桜、見に行きました？ 私は歩きながら眺めるだけでも幸せで。", "follow": "混雑や場所取りより「どう楽しむか」に焦点を。「今度きれいな並木道あるんですよ」と誘いにつなげられます。"}, {"topic": "新しい環境", "opener": "4月って、周りがバタバタしませんか？ 環境の変化ってちょっと疲れますよね。", "follow": "共感から入ると本音が出やすいです。相手をねぎらう姿勢を見せると、安心して話してもらえます。"}, {"topic": "春の装い", "opener": "だいぶ軽い服装で出かけられる季節になりましたね。過ごしやすくて好きです。", "follow": "外見評価に寄せず気候の話として扱うのがコツ。「春はどこかお出かけしたくなりますね」と外出トークへ。"}]}, {"month": 5, "label": "5月", "kigo": "新緑・ゴールデンウィーク・立夏", "topics": [{"topic": "連休の過ごし方", "opener": "連休ってどう過ごしました？ 遠出派ですか、のんびり派ですか？", "follow": "二択で聞くと答えやすいです。旅の話でも家での話でも、相手の答えに乗って一つ掘り下げると盛り上がります。"}, {"topic": "新緑の心地よさ", "opener": "この時期の緑って、見てるだけで元気出ませんか？ 散歩が気持ちいい季節ですよね。", "follow": "自然の話は穏やかな空気を作ります。「近くにいい公園あるんですよ」と一緒に歩く提案につなげられます。"}, {"topic": "衣替えのころ", "opener": "そろそろ暑い日も出てきましたね。この時期の気温差、ついていくの大変で。", "follow": "季節の変わり目の体調を気づかう話題に。「風邪ひかないでくださいね」と相手を思う一言で温度が上がります。"}]}, {"month": 6, "label": "6月", "kigo": "梅雨・紫陽花・夏至", "topics": [{"topic": "雨の日の楽しみ", "opener": "雨の日って、どう過ごすの好きですか？ 私は逆にちょっと落ち着くんです。", "follow": "ネガティブになりがちな梅雨を前向きに転換。「雨の日のおすすめの過ごし方」を交換すると意外と盛り上がります。"}, {"topic": "紫陽花の季節", "opener": "紫陽花がきれいな時期ですね。色によって表情が違うの、面白いなって思います。", "follow": "季節の花は穏やかな共通話題です。「見に行くと気分変わりますよ」と雨の日デートの提案にもつなげられます。"}, {"topic": "梅雨の乗り切り方", "opener": "じめじめする時期、気分上げるためにやってることってあります？", "follow": "工夫や習慣から人柄が見えます。相手のアイデアに「それいいですね、真似します」と受けると会話が往復します。"}]}, {"month": 7, "label": "7月", "kigo": "七夕・海開き・小暑", "topics": [{"topic": "七夕の願い", "opener": "七夕って、短冊に願い事書くとしたら何にします？ 私、けっこう悩んじゃって。", "follow": "遊び心のある質問で相手の素が出ます。「叶うといいですね」と明るく受け、自分の願いも軽く添えると和みます。"}, {"topic": "夏の始まりの予定", "opener": "夏って、これやりたいなって思ってることあります？", "follow": "季節の楽しみを共有すると気分が上がります。「一緒に行けたら楽しそうですね」と自然に次の約束へつなげられます。"}, {"topic": "暑さ対策", "opener": "暑くなってきましたね。夏バテしないように気をつけてることってあります？", "follow": "体調を気づかう話題は思いやりが伝わります。相手の工夫を聞き、自分の方法も共有すると生活感がにじみます。"}]}, {"month": 8, "label": "8月", "kigo": "花火・お盆・立秋・夏祭り", "topics": [{"topic": "花火の思い出", "opener": "花火大会って行きます？ 私は遠くから眺めるのも好きなんですよね。", "follow": "夏の風物詩は情緒のある話題です。「今度近くで上がるみたいですよ」と一緒に見に行く提案の口実になります。"}, {"topic": "夏祭りの雰囲気", "opener": "お祭りの屋台って、つい見ちゃいませんか？ 何が一番好きですか？", "follow": "食べ物や射的など具体的な思い出で盛り上がります。童心に返る話題は距離をぐっと縮めてくれます。"}, {"topic": "お盆の過ごし方", "opener": "お盆って帰省したりします？ ゆっくりできる時間だといいですね。", "follow": "家族や休みの話にやわらかく触れられます。詮索せず、相手が話したい範囲を尊重する軽さが大切です。"}]}, {"month": 9, "label": "9月", "kigo": "十五夜・お月見・秋分・彼岸", "topics": [{"topic": "お月見の風情", "opener": "そろそろお月見の季節ですね。夜、月を見上げる余裕って大事だなって思います。", "follow": "季節の風情に触れると穏やかな空気に。「今度の満月きれいらしいですよ」と夜の散歩の提案にもつなげられます。"}, {"topic": "秋の気配", "opener": "朝晩ちょっと涼しくなってきましたね。夏の疲れ、出てないですか？", "follow": "季節の変わり目に相手を気づかう一言。体調トークから生活リズムの話へ自然に広げられます。"}, {"topic": "実りの秋の味覚", "opener": "秋の味覚って何が好きですか？ 私は毎年これだけは外せないってのがあって。", "follow": "旬の食べ物は盛り上がる定番です。「今度その旬のもの食べに行きたいですね」と食事デートへの布石にできます。"}]}, {"month": 10, "label": "10月", "kigo": "紅葉・ハロウィン・秋の夜長・寒露", "topics": [{"topic": "紅葉狩り", "opener": "紅葉、見に行ったりします？ 色づく景色を歩くの、この季節の楽しみで。", "follow": "秋のお出かけの提案につなげやすい話題です。「一緒に歩いたら気持ちよさそうですね」と誘いを軽く匂わせて。"}, {"topic": "秋の夜長の楽しみ", "opener": "夜が長くなると、ついのんびりしちゃいませんか？ おうち時間、何して過ごします？", "follow": "読書・映画・音楽など趣味の入り口に。相手の答えに「私も好きです」と接点を見つけると距離が縮まります。"}, {"topic": "ハロウィンの空気", "opener": "街がだんだんハロウィンっぽくなってきましたね。ああいう季節の飾り、見るの好きなんです。", "follow": "イベントは無理に乗らず雰囲気を楽しむ話題として。「季節ごとの飾りっていいですよね」と感性の共有へ。"}]}, {"month": 11, "label": "11月", "kigo": "立冬・七五三・木枯らし・晩秋", "topics": [{"topic": "温かい食べ物", "opener": "寒くなってくると、あったかいもの恋しくなりますね。鍋とか好きですか？", "follow": "冬の食の話は共感を呼びます。好きな鍋の具材や〆の話など、身近で楽しい方向に広げましょう。"}, {"topic": "冬支度", "opener": "そろそろコート出しました？ 私、毎年しまい込んで探すのに苦労するんですよ。", "follow": "季節の準備は生活感がにじむ話題です。自分の小さな失敗談を添えると、親しみやすさが伝わります。"}, {"topic": "秋から冬への切り替え", "opener": "日が暮れるの早くなりましたね。この時間になると、なんだか落ち着きます。", "follow": "季節の移ろいへの感性を共有する話題。「早く帰ってあったかくして過ごしたくなりますね」と暮らしの話へ。"}]}, {"month": 12, "label": "12月", "kigo": "冬至・クリスマス・年の瀬・大晦日", "topics": [{"topic": "今年の振り返り", "opener": "今年ももうすぐ終わりですね。振り返ってみて、どんな一年でした？", "follow": "一年をねぎらう温かい話題です。相手の頑張りに「お疲れさまでした」と寄り添うと、信頼が深まります。"}, {"topic": "冬の楽しみ", "opener": "イルミネーションとか見に行きます？ 寒いけど、あの雰囲気は好きなんですよね。", "follow": "季節のイベントは自然な誘いの口実に。「今度きれいなところ一緒に行けたら」と控えめに提案できます。"}, {"topic": "年末年始の予定", "opener": "年末って、バタバタしますか？ ゆっくり休める時間があるといいですね。", "follow": "予定を詮索せず、相手をねぎらう姿勢で。「良いお年を」と温かく締めると、年明けの連絡にもつなげやすいです。"}]}],
"homerase":[{"target": "聞き上手なところ", "phrase": "○○さんって、すごく話しやすいです。ちゃんと聞いてくれるのが伝わってきます。", "point": "具体的な振る舞いを挙げて褒めると説得力が出ます。相手が実際にしてくれたことに触れましょう。"}, {"target": "気配り・さりげない優しさ", "phrase": "さっきの気づかい、さらっとできるのすごいですね。ちゃんと見てるんだなって。", "point": "その場で起きた小さな行動を逃さず言葉に。大げさにせず、素直な驚きとして伝えるのがコツです。"}, {"target": "笑顔・雰囲気の柔らかさ", "phrase": "○○さんといると、なんだか場の空気がやわらかくなりますね。", "point": "外見でなく相手が作る空気を褒めます。一緒にいる心地よさを言葉にすると自然に響きます。"}, {"target": "仕事や物事への姿勢", "phrase": "お仕事の話、すごく丁寧に向き合ってるのが伝わってきて、素敵だなって思いました。", "point": "内容より姿勢を褒めると刺さります。相手が語ったエピソードを受けて具体的に返しましょう。"}, {"target": "センス・好みのよさ", "phrase": "そのお店選び、センスいいですね。こういうの見つけるの得意なんですか？", "point": "選択や好みを褒めると人格を認めることに。質問を添えると相手も気持ちよく話を広げられます。"}, {"target": "誠実さ・約束を守る姿勢", "phrase": "こういうところ、きちんとしてる人なんだなって安心します。", "point": "時間を守る、連絡が丁寧などの行動を根拠に。信頼につながる資質を認めると重みが出ます。"}, {"target": "話の面白さ・視点", "phrase": "その話、視点が面白いですね。もっと聞きたくなっちゃいます。", "point": "相手の考え方を褒めると会話が続きます。「もっと聞きたい」と関心を示すと相手も乗ってきます。"}, {"target": "頑張っている姿", "phrase": "いろいろ抱えながらちゃんとやってて、本当にすごいと思います。無理しすぎないでくださいね。", "point": "努力をねぎらう言葉は深く響きます。褒めたあとに気づかいを添えると、思いやりまで伝わります。"}]
