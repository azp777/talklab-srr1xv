let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));return Object.assign({},DEF,r||{});}catch(e){return Object.assign({},DEF);}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function today(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function touchStreak(){
  const t=today();
  if(S.lastDay===t)return;
  const y=new Date();y.setDate(y.getDate()-1);
  const ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  S.streak=(S.lastDay===ys)?S.streak+1:1;
  S.lastDay=t;save();
}
const LEVELS=[{n:"会話見習い",x:0},{n:"聞き上手の卵",x:100},{n:"話題の引き出し中堅",x:300},{n:"デート会話上級",x:600},{n:"トークマスター",x:1000}];
function levelInfo(){
  let lv=0;for(let i=0;i<LEVELS.length;i++){if(S.xp>=LEVELS[i].x)lv=i;}
  const cur=LEVELS[lv];const next=LEVELS[lv+1]||null;
  const base=cur.x;const goal=next?next.x:cur.x;
  const pct=next?Math.min(100,Math.round((S.xp-base)/(goal-base)*100)):100;
  return{lv:lv+1,name:cur.n,next:next?next.n:null,need:next?goal-S.xp:0,pct};
}
function addXp(n){S.xp+=n;save();}
/* ===== HELPERS ===== */
const $=s=>document.querySelector(s);
const M=()=>$("#main");
function esc(t){return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nl2br(t){return esc(t).replace(/\n/g,"<br>");}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function catAcc(c){const q=Object.values(S.quiz).filter(x=>x.cat===c);let ok=0,t=0;q.forEach(x=>{ok+=x.ok;t+=x.ok+x.ng;});return t?ok/t:null;}
function quizStat(){let solved=0;QUIZ.forEach(q=>{if(S.quiz[q.id]&&S.quiz[q.id].ok>0)solved++;});return{solved,total:QUIZ.length};}
function recordQuiz(q,correct){
  const r=S.quiz[q.id]||{ok:0,ng:0,cat:q.cat};r.cat=q.cat;
  if(correct)r.ok++;else r.ng++;S.quiz[q.id]=r;save();
}
function wrongIds(){return QUIZ.filter(q=>{const r=S.quiz[q.id];return r&&r.ng>0;});}
/* ===== ROUTER ===== */
let TAB="home";
function go(tab){
  TAB=tab;
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  M().scrollTop=0;window.scrollTo(0,0);
  ({home:viewHome,quiz:viewQuiz,sim:viewSim,tech:viewTech,neta:viewNeta}[tab]||viewHome)();
}
document.querySelectorAll("#tabs button").forEach(b=>b.addEventListener("click",()=>go(b.dataset.tab)));
/* ===== HOME ===== */
function todaySeason(){
  const m=new Date().getMonth()+1;
  const groups=NETA.seasons||[];
  if(!groups.length)return null;
  let g=groups.find(s=>s.month===m)||groups[0];
  // seasons は {month,label,topics:[{topic,opener,follow}]} のグループ構造。
  // 旧フラット構造(topic を直接持つ)にも一応対応。
  const topics=(g&&g.topics&&g.topics.length)?g.topics:(g&&g.topic?[g]:[]);
  if(!topics.length)return null;
  const d=new Date().getDate();
  return topics[d%topics.length];
}
function weakCat(){
  let worst=null,wa=2;
  Object.keys(CATS).forEach(c=>{const a=catAcc(c);if(a!==null&&a<wa){wa=a;worst=c;}});
  return worst?{cat:worst,acc:wa}:null;
}
function viewHome(){
  const li=levelInfo();const qs=quizStat();
  const scenesDone=Object.keys(S.scenes).length;
  const ts=todaySeason();const wc=weakCat();
  let h="<div class='view'>";
  h+="<div class='card'><div class='row'><div><div class='muted tag'>Lv."+li.lv+"</div><b style='font-size:1.15rem;letter-spacing:.06em' class='gold'>"+esc(li.name)+"</b></div><div class='center'><div style='font-size:1.3rem'>🔥"+S.streak+"</div><div class='tag'>連続学習日</div></div></div>";
  h+="<div class='progress'><i style='width:"+li.pct+"%'></i></div>";
  h+="<div class='muted' style='font-size:.76rem'>"+(li.next?("次のレベル「"+esc(li.next)+"」まで あと "+li.need+" XP"):"最高レベル達成！")+" ・ 累計 "+S.xp+"XP</div></div>";
  if(ts){h+="<div class='card'><div class='sec-title mb0'>今日のネタ</div><div class='muted' style='margin:6px 0 8px'>"+esc(ts.topic)+"</div><div class='opener'>"+esc(ts.opener)+"</div>"+(ts.follow?"<div class='muted' style='font-size:.78rem;margin-top:6px'>"+esc(ts.follow)+"</div>":"")+"</div>";}
  h+="<div class='card'><div class='shortcut' onclick=\"go('quiz')\"><div class='ico'>📝</div><div class='t'><b>クイズで教養を磨く</b><div class='muted' style='font-size:.78rem'>正解済み "+qs.solved+" / "+qs.total+" 問</div></div><div class='arw'>›</div></div></div>";
  h+="<div class='card'><div class='shortcut' onclick=\"go('sim')\"><div class='ico'>💬</div><div class='t'><b>会話シミュで実践</b><div class='muted' style='font-size:.78rem'>攻略シーン "+scenesDone+" / "+SCENES.length+"</div></div><div class='arw'>›</div></div></div>";
  h+="<div class='grid2'>";
  h+="<div class='card' style='cursor:pointer' onclick=\"go('tech')\"><div style='font-size:1.6rem'>✨</div><b style='letter-spacing:.04em'>テクニック</b><div class='muted' style='font-size:.76rem'>読了 "+S.readTech.length+" / "+TECH.length+"</div></div>";
  h+="<div class='card' style='cursor:pointer' onclick=\"go('neta')\"><div style='font-size:1.6rem'>📔</div><b style='letter-spacing:.04em'>ネタ帳</b><div class='muted' style='font-size:.76rem'>話題を仕込む</div></div>";
  h+="</div>";
  if(wc){h+="<div class='card'><div class='sec-title mb0'>苦手カテゴリ</div><div class='row mt12'><div>"+CATS[wc.cat].icon+" <b>"+esc(CATS[wc.cat].label)+"</b></div><div class='rose'>正答率 "+Math.round(wc.acc*100)+"%</div></div><button class='btn ghost mt12' onclick=\"startQuiz('__weak__')\">苦手を克服する</button></div>";}
  h+="</div>";
  M().innerHTML=h;
}
/* ===== QUIZ ===== */
let QZ=null;
function viewQuiz(){
  let h="<div class='view'><div class='sec-title'>クイズ ・ カテゴリを選ぶ</div>";
  h+="<div class='card'>";
  Object.keys(CATS).forEach(c=>{
    const st=QUIZ.filter(q=>q.cat===c).length;
    h+="<div class='shortcut' style='padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)' onclick=\"startQuiz('"+c+"')\"><div class='ico'>"+CATS[c].icon+"</div><div class='t'><b>"+esc(CATS[c].label)+"</b><div class='muted' style='font-size:.74rem'>"+st+" 問</div></div><div class='arw'>›</div></div>";
  });
  h+="<div class='shortcut' style='padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)' onclick=\"startQuiz('__all__')\"><div class='ico'>🎲</div><div class='t'><b>全部から</b><div class='muted' style='font-size:.74rem'>"+QUIZ.length+" 問</div></div><div class='arw'>›</div></div>";
  const w=wrongIds().length;
  h+="<div class='shortcut' style='padding:9px 0' onclick=\"startQuiz('__weak__')\"><div class='ico'>🔁</div><div class='t'><b>苦手克服</b><div class='muted' style='font-size:.74rem'>間違えた "+w+" 問から</div></div><div class='arw'>›</div></div>";
  h+="</div></div>";
  M().innerHTML=h;
}
function startQuiz(mode){
  let pool;
  if(mode==="__all__")pool=QUIZ.slice();
  else if(mode==="__weak__")pool=wrongIds();
  else pool=QUIZ.filter(q=>q.cat===mode);
  if(!pool.length){M().innerHTML="<div class='view'><div class='card center'><p>まだ問題がありません。</p><button class='btn ghost mt12' onclick=\"go('quiz')\">戻る</button></div></div>";return;}
  const qs=shuffle(pool).slice(0,10);
  QZ={qs,i:0,ok:0,xp:0,answered:false};
  renderQ();
}
function renderQ(){
  const q=QZ.qs[QZ.i];
  let h="<div class='view'><div class='muted' style='margin-bottom:6px'>問 "+(QZ.i+1)+" / "+QZ.qs.length+" ・ "+(CATS[q.cat]?CATS[q.cat].icon+CATS[q.cat].label:esc(q.cat))+"</div>";
  h+="<div class='progress' style='margin-bottom:14px'><i style='width:"+((QZ.i)/QZ.qs.length*100)+"%'></i></div>";
  h+="<div class='card'><b style='font-size:1rem;letter-spacing:.03em;display:block;margin-bottom:6px'>"+esc(q.q)+"</b><div id='chs'>";
  q.choices.forEach((c,idx)=>{h+="<button class='choice' onclick='answer("+idx+")'>"+esc(c)+"</button>";});
  h+="</div><div id='exp'></div></div></div>";
  M().innerHTML=h;
}
function answer(idx){
  if(QZ.answered)return;QZ.answered=true;touchStreak();
  const q=QZ.qs[QZ.i];const correct=idx===q.answer;
  recordQuiz(q,correct);
  if(correct){QZ.ok++;addXp(10);QZ.xp+=10;}
  const btns=document.querySelectorAll("#chs .choice");
  btns.forEach((b,i)=>{b.onclick=null;if(i===q.answer)b.classList.add("correct");else if(i===idx)b.classList.add("wrong");else b.classList.add("dim");});
  let e="<div class='expbox'><b>"+(correct?"⭕ 正解！ +10XP":"❌ 残念…")+"</b><div style='margin-top:6px'>"+nl2br(q.exp)+"</div>";
  if(q.use)e+="<div class='use'>💡 デートでの使い方<br>"+nl2br(q.use)+"</div>";
  e+="<button class='btn mt12' onclick='nextQ()'>"+(QZ.i+1<QZ.qs.length?"次へ":"結果を見る")+"</button></div>";
  $("#exp").innerHTML=e;
}
function nextQ(){
  QZ.i++;QZ.answered=false;
  if(QZ.i<QZ.qs.length)renderQ();else quizResult();
}
function quizResult(){
  const r=Math.round(QZ.ok/QZ.qs.length*100);
  let h="<div class='view'><div class='card center'><div class='sec-title'>セッション結果</div>";
  h+="<div class='big'>"+QZ.ok+" / "+QZ.qs.length+"</div><div class='muted'>正答率 "+r+"%</div>";
  h+="<div class='hearts'>"+(r>=80?"🌸🌸🌸":r>=50?"🌸🌸":"🌸")+"</div>";
  h+="<p class='gold' style='margin:8px 0'>獲得 "+QZ.xp+"XP</p>";
  h+="<button class='btn' onclick=\"go('quiz')\">もう一度</button>";
  h+="<button class='btn ghost mt12' onclick=\"go('home')\">ホームへ</button></div></div>";
  M().innerHTML=h;QZ=null;
}
/* ===== SIM ===== */
let SM=null;
function viewSim(){
  let h="<div class='view'><div class='sec-title'>会話シミュレーション</div>";
  if(!SCENES.length){h+="<div class='card center muted'>準備中のシーンです。</div></div>";M().innerHTML=h;return;}
  SCENES.forEach((sc,i)=>{
    const best=S.scenes[sc.id];
    h+="<div class='card'><b style='font-size:1rem;letter-spacing:.04em'>"+esc(sc.title)+"</b><div class='muted' style='font-size:.82rem;margin:6px 0'>"+esc(sc.desc)+"</div>";
    h+="<div class='row'><div class='tag'>"+(best!=null?("ベスト "+best+"% "+"❤️".repeat(Math.max(1,Math.round(best/20)))):"未挑戦")+"</div><button class='btn' style='width:auto;padding:9px 18px' onclick='startScene("+i+")'>挑戦</button></div></div>";
  });
  h+="</div>";M().innerHTML=h;
}
function startScene(i){
  const sc=SCENES[i];
  SM={sc,step:0,score:0,max:0,log:[]};
  renderScene();
}
function renderScene(){
  const sc=SM.sc;const st=sc.steps[SM.step];
  let h="<div class='view'><div class='muted' style='margin-bottom:8px'>"+esc(sc.title)+" ・ "+(SM.step+1)+"/"+sc.steps.length+"</div>";
  h+="<div class='card'><div class='chatwrap' id='chat'>";
  SM.log.forEach(m=>{h+="<div class='bubble "+(m.who==='p'?'p':'me')+"'>"+esc(m.t)+"</div>";});
  h+="<div class='bubble p'>"+esc(st.partner)+"</div>";
  h+="</div><div id='sfb'></div><div id='opts'>";
  st.choices.forEach((c,idx)=>{h+="<button class='choice' onclick='pick("+idx+")'>"+esc(c.t)+"</button>";});
  h+="</div></div></div>";
  M().innerHTML=h;
}
function pick(idx){
  const sc=SM.sc;const st=sc.steps[SM.step];const c=st.choices[idx];
  SM.log.push({who:'p',t:st.partner});
  SM.log.push({who:'me',t:c.t});
  const maxS=Math.max.apply(null,st.choices.map(x=>x.s));
  SM.score+=c.s;SM.max+=maxS;
  document.querySelectorAll("#opts .choice").forEach(b=>b.onclick=null);
  $("#opts").innerHTML="";
  $("#sfb").innerHTML="<div class='fb'>💬 "+esc(c.fb)+"</div><button class='btn mt12' onclick='nextScene()'>"+(SM.step+1<sc.steps.length?"次へ":"結果を見る")+"</button>";
  const ch=$("#chat");if(ch){ch.innerHTML+="<div class='bubble me'>"+esc(c.t)+"</div>";}
}
function nextScene(){
  SM.step++;
  if(SM.step<SM.sc.steps.length)renderScene();else sceneResult();
}
function sceneResult(){
  const sc=SM.sc;touchStreak();
  const pct=SM.max?Math.round(SM.score/SM.max*100):0;
  const gain=SM.score*5;addXp(gain);
  const prev=S.scenes[sc.id];
  if(prev==null||pct>prev){S.scenes[sc.id]=pct;save();}
  const end=pct>=80?sc.endings.high:pct>=50?sc.endings.mid:sc.endings.low;
  const hearts=Math.max(1,Math.round(pct/20));
  let h="<div class='view'><div class='card center'><div class='sec-title'>会話終了</div>";
  h+="<div class='big'>"+SM.score+" / "+SM.max+"</div><div class='muted'>好感度 "+pct+"%</div>";
  h+="<div class='hearts'>"+"❤️".repeat(hearts)+"🤍".repeat(Math.max(0,5-hearts))+"</div>";
  h+="<div class='expbox' style='text-align:left'>"+esc(end)+"</div>";
  h+="<p class='gold' style='margin:10px 0'>獲得 "+gain+"XP</p>";
  h+="<button class='btn' onclick=\"go('sim')\">シーン一覧へ</button>";
  h+="<button class='btn ghost mt12' onclick=\"go('home')\">ホームへ</button></div></div>";
  M().innerHTML=h;SM=null;
}
/* ===== TECH ===== */
const TECH_CATS=["きく","ひろげる","つたえる","ピンチ対応","オンライン"];
let techFilter="きく",techOpen=null;
function viewTech(){
  let h="<div class='view'><div class='sec-title'>会話テクニック</div><div style='margin-bottom:10px'>";
  TECH_CATS.forEach(c=>{h+="<span class='pill "+(c===techFilter?'on':'')+"' onclick=\"setTechCat('"+c+"')\">"+esc(c)+"</span>";});
  h+="</div><div class='card'>";
  const list=TECH.filter(t=>t.cat===techFilter);
  if(!list.length)h+="<div class='muted center'>このカテゴリは準備中です。</div>";
  list.forEach(t=>{
    const read=S.readTech.indexOf(t.id)>=0;
    h+="<div class='tech-item' onclick=\"toggleTech('"+t.id+"')\"><div class='nm'><span>"+esc(t.name)+(read?" <span class='done-mark'>✓</span>":"")+"</span><span class='muted'>"+(techOpen===t.id?"▲":"▼")+"</span></div><div class='muted' style='font-size:.8rem;margin-top:3px'>"+esc(t.summary)+"</div>";
    if(techOpen===t.id){
      h+="<div class='tech-body'>";
      h+="<span class='lbl'>やり方</span>"+nl2br(t.how);
      if(t.example){h+="<span class='lbl'>会話例</span><div class='quote'>"+nl2br(t.example)+"</div>";}
      if(t.caution){h+="<span class='lbl'>注意点</span>"+nl2br(t.caution);}
      h+="</div>";
    }
    h+="</div>";
  });
  h+="</div></div>";M().innerHTML=h;
}
function setTechCat(c){techFilter=c;techOpen=null;viewTech();}
function toggleTech(id){
  techOpen=techOpen===id?null:id;
  if(techOpen&&S.readTech.indexOf(id)<0){S.readTech.push(id);save();touchStreak();}
  viewTech();
}
/* ===== NETA ===== */
let netaTab="seasons",netaMonth=new Date().getMonth()+1;
function topicCard(topic,opener,follow){
  let h="<div class='card'><b style='letter-spacing:.04em'>"+esc(topic)+"</b><div class='opener'>"+esc(opener)+"</div>";
  if(follow)h+="<div class='muted' style='font-size:.8rem;margin-top:4px'>↳ "+esc(follow)+"</div>";
  return h+"</div>";
}
function viewNeta(){
  let h="<div class='view'><div class='sec-title'>ネタ帳</div><div style='margin-bottom:10px'>";
  [["situations","シーン別"],["seasons","季節"],["homerase","褒めフレーズ"]].forEach(x=>{
    h+="<span class='pill "+(x[0]===netaTab?'on':'')+"' onclick=\"setNeta('"+x[0]+"')\">"+x[1]+"</span>";
  });
  h+="</div>";
  const data=NETA[netaTab]||[];
  if(netaTab==="situations"){
    // [{scene, topics:[{topic,opener,follow}]}]
    if(!data.length)h+="<div class='card muted center'>準備中です。</div>";
    data.forEach(g=>{
      h+="<div class='muted' style='margin:14px 2px 4px;letter-spacing:.06em'>▸ "+esc(g.scene||g.topic||"")+"</div>";
      (g.topics||[g]).forEach(t=>{h+=topicCard(t.topic,t.opener,t.follow);});
    });
  }else if(netaTab==="seasons"){
    // [{month,label,kigo,topics:[...]}]
    h+="<div style='margin-bottom:10px'>";
    for(let m=1;m<=12;m++){h+="<span class='pill "+(m===netaMonth?'on':'')+"' style='padding:4px 9px' onclick=\"setMonth("+m+")\">"+m+"月</span>";}
    h+="</div>";
    const g=data.find(s=>s.month===netaMonth);
    if(!g){h+="<div class='card muted center'>この月は準備中です。</div>";}
    else{
      if(g.kigo)h+="<div class='muted' style='margin:4px 2px 8px'>🌸 "+esc(g.label||"")+"の季語・話題: "+esc(g.kigo)+"</div>";
      (g.topics||[g]).forEach(t=>{h+=topicCard(t.topic,t.opener,t.follow);});
    }
  }else{
    // homerase: [{target,phrase,point}]
    if(!data.length)h+="<div class='card muted center'>準備中です。</div>";
    data.forEach(t=>{h+=topicCard(t.target||t.topic,t.phrase||t.opener,t.point||t.follow);});
  }
  h+="</div>";M().innerHTML=h;
}
function setNeta(t){netaTab=t;viewNeta();}
function setMonth(m){netaMonth=m;viewNeta();}
/* ===== INIT ===== */
go("home");
</script>
</body>
